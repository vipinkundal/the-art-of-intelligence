        <section>
          <h2>Vision pipeline</h2>
          <div class="lesson-graphic" aria-label="Computer vision pipeline">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>Pixels to features</strong>
                <span>Filter, transform, and describe image structure such as edges, corners, and texture.</span>
              </div>
              <div class="graphic-node">
                <strong>Features to meaning</strong>
                <span>Classify, detect, segment, track, and estimate pose or depth.</span>
              </div>
              <div class="graphic-node">
                <strong>Meaning to scenes</strong>
                <span>Reconstruct 3D geometry, render new views, or generate visual worlds.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>15.1 Classical vision</h2>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Image_formation" target="_blank" rel="noopener noreferrer" title="Wikipedia: Image formation">Image formation</a>:</strong> Describes how light, lenses, sensors, and projection create images.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Color_space" target="_blank" rel="noopener noreferrer" title="Wikipedia: Color space">Colour spaces</a>:</strong> Represent color in systems such as RGB, HSV, LAB, or YCbCr for different tasks.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Histogram" target="_blank" rel="noopener noreferrer" title="Wikipedia: Histogram">Histograms</a>:</strong> Summarize pixel intensity or color distributions.</li>
            <li><strong>Convolution and filtering:</strong> Apply kernels to enhance, smooth, detect, or transform image patterns.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Gaussian_blur" target="_blank" rel="noopener noreferrer" title="Wikipedia: Gaussian blur">Gaussian blur</a>:</strong> Smooths images by averaging nearby pixels with Gaussian weights.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Median_filter" target="_blank" rel="noopener noreferrer" title="Wikipedia: Median filter">Median filtering</a>:</strong> Removes impulse noise by replacing pixels with neighborhood medians.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Edge_detection" target="_blank" rel="noopener noreferrer" title="Wikipedia: Edge detection">Edge detection</a>:</strong> Finds sharp intensity changes that often mark object boundaries.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Canny_edge_detector" target="_blank" rel="noopener noreferrer" title="Wikipedia: Canny edge detector">Canny detector</a>:</strong> A multi-step edge detector using smoothing, gradients, suppression, and thresholds.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Hough_transform" target="_blank" rel="noopener noreferrer" title="Wikipedia: Hough transform">Hough transform</a>:</strong> Detects geometric shapes such as lines and circles through parameter voting.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Mathematical_morphology" target="_blank" rel="noopener noreferrer" title="Wikipedia: Mathematical morphology">Morphological operations</a>:</strong> Use shape-based operations like erosion and dilation on binary or grayscale images.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Fourier_transform" target="_blank" rel="noopener noreferrer" title="Wikipedia: Fourier transform">Fourier transforms</a>:</strong> Analyze images by frequency content instead of spatial pixels.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Wavelet" target="_blank" rel="noopener noreferrer" title="Wikipedia: Wavelet">Wavelets</a>:</strong> Represent image details at multiple locations and scales.</li>
            <li><strong>Image pyramids:</strong> Store images at multiple resolutions for scale-aware processing.</li>
            <li><strong>Harris corners:</strong> Detect points where image gradients change strongly in two directions.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Scale-invariant_feature_transform" target="_blank" rel="noopener noreferrer" title="Wikipedia: Scale-invariant feature transform">SIFT</a>:</strong> Detects and describes scale-invariant local features for matching.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Speeded_up_robust_features" target="_blank" rel="noopener noreferrer" title="Wikipedia: Speeded up robust features">SURF</a>:</strong> A faster feature detector and descriptor inspired by SIFT.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Oriented_FAST_and_rotated_BRIEF" target="_blank" rel="noopener noreferrer" title="Wikipedia: Oriented FAST and rotated BRIEF">ORB</a>:</strong> Efficient binary features useful for real-time matching.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Histogram_of_oriented_gradients" target="_blank" rel="noopener noreferrer" title="Wikipedia: Histogram of oriented gradients">HOG</a>:</strong> Describes local gradient orientations, historically useful for object detection.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Random_sample_consensus" target="_blank" rel="noopener noreferrer" title="Wikipedia: Random sample consensus">RANSAC</a>:</strong> Fits models robustly by repeatedly sampling and rejecting outliers.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Optical_flow" target="_blank" rel="noopener noreferrer" title="Wikipedia: Optical flow">Optical flow</a>:</strong> Estimates pixel or feature motion between video frames.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Epipolar_geometry" target="_blank" rel="noopener noreferrer" title="Wikipedia: Epipolar geometry">Epipolar geometry</a>:</strong> Describes geometric constraints between two camera views.</li>
            <li><strong>Camera calibration:</strong> Estimates camera intrinsics and distortion so geometry is measurable.</li>
            <li><strong>Homographies:</strong> Map points between planar views or camera perspectives.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Stereopsis" target="_blank" rel="noopener noreferrer" title="Wikipedia: Stereopsis">Stereo vision</a>:</strong> Uses two views to estimate depth from disparity.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Structure_from_motion" target="_blank" rel="noopener noreferrer" title="Wikipedia: Structure from motion">Structure from motion</a>:</strong> Reconstructs camera motion and 3D structure from multiple images.</li>
          </ul>
        </section>

        <section>
          <h2>15.2 Deep vision</h2>
          <p>Study:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Computer_vision" target="_blank" rel="noopener noreferrer" title="Wikipedia: Computer vision">Image classification</a>:</strong> Assigns one or more labels to an entire image.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Object_detection" target="_blank" rel="noopener noreferrer" title="Wikipedia: Object detection">Object detection</a>:</strong> Finds object classes and bounding boxes.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Image_segmentation" target="_blank" rel="noopener noreferrer" title="Wikipedia: Image segmentation">Semantic segmentation</a>:</strong> Assigns a class label to every pixel.</li>
            <li><strong>Instance segmentation:</strong> Separates individual object instances at pixel level.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Image_segmentation" target="_blank" rel="noopener noreferrer" title="Wikipedia: Image segmentation">Panoptic segmentation</a>:</strong> Combines semantic and instance segmentation into one scene map.</li>
            <li><strong>Keypoint detection:</strong> Locates important points such as joints, corners, or landmarks.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/3D_pose_estimation" target="_blank" rel="noopener noreferrer" title="Wikipedia: 3D pose estimation">Pose estimation</a>:</strong> Infers body, object, or camera pose from visual evidence.</li>
            <li><strong>Tracking:</strong> Maintains object identities across video frames.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Depth_perception" target="_blank" rel="noopener noreferrer" title="Wikipedia: Depth perception">Depth estimation</a>:</strong> Predicts distance from the camera for pixels or regions.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Optical_flow" target="_blank" rel="noopener noreferrer" title="Wikipedia: Optical flow">Optical flow</a>:</strong> Estimates dense motion between frames using learned or classical methods.</li>
            <li><strong>Image restoration:</strong> Removes degradation such as blur, noise, compression, or damage.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Super-resolution_imaging" target="_blank" rel="noopener noreferrer" title="Wikipedia: Super-resolution imaging">Super-resolution</a>:</strong> Generates a higher-resolution image from a lower-resolution input.</li>
            <li><strong>Image generation:</strong> Produces new images from noise, text, images, or structured controls.</li>
          </ul>
          <p>Important families:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Region_Based_Convolutional_Neural_Networks" target="_blank" rel="noopener noreferrer" title="Wikipedia: Region Based Convolutional Neural Networks">R-CNN</a>:</strong> Classifies proposed regions to detect objects.</li>
            <li><strong>Fast R-CNN:</strong> Shares convolutional features across region proposals for faster detection.</li>
            <li><strong>Faster R-CNN:</strong> Adds a neural region proposal network.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/You_Only_Look_Once" target="_blank" rel="noopener noreferrer" title="Wikipedia: You Only Look Once">YOLO</a>:</strong> Performs single-stage real-time object detection.</li>
            <li><strong>SSD:</strong> Detects objects from multiple feature-map scales in one pass.</li>
            <li><strong>RetinaNet:</strong> Uses focal loss to handle class imbalance in dense detection.</li>
            <li><strong>DETR:</strong> Frames object detection as set prediction with transformers.</li>
            <li><strong>FCN:</strong> Fully convolutional network for dense pixel prediction.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/U-Net" target="_blank" rel="noopener noreferrer" title="Wikipedia: U-Net">U-Net</a>:</strong> Encoder-decoder segmentation network with skip connections.</li>
            <li><strong>Mask R-CNN:</strong> Extends Faster R-CNN with instance mask prediction.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Vision_transformer" target="_blank" rel="noopener noreferrer" title="Wikipedia: Vision transformer">Vision Transformer</a>:</strong> Processes image patches as transformer tokens.</li>
            <li><strong>Swin Transformer:</strong> Uses shifted local windows for efficient hierarchical vision transformers.</li>
            <li><strong>Segment-anything-style models:</strong> Use promptable segmentation to create masks from points, boxes, or text-like cues.</li>
            <li><strong>Masked autoencoders:</strong> Learn visual representations by reconstructing hidden image patches.</li>
          </ul>
        </section>

        <section>
          <h2>15.3 Three-dimensional vision and generation</h2>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Point_cloud" target="_blank" rel="noopener noreferrer" title="Wikipedia: Point cloud">Point clouds</a>:</strong> Represent 3D scenes as unordered sets of points in space.</li>
            <li><strong>Voxel methods:</strong> Represent 3D space as a grid of volume cells.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Mesh" target="_blank" rel="noopener noreferrer" title="Wikipedia: Mesh">Meshes</a>:</strong> Represent surfaces with vertices, edges, and faces.</li>
            <li><strong>Signed distance functions:</strong> Store distance to the nearest surface, with sign indicating inside or outside.</li>
            <li><strong>Neural radiance fields:</strong> Learn a continuous scene function that renders novel camera views.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Gaussian_splatting" target="_blank" rel="noopener noreferrer" title="Wikipedia: Gaussian splatting">3D Gaussian splatting</a>:</strong> Represents scenes with many learned Gaussian blobs that can be rendered efficiently.</li>
            <li><strong>Novel-view synthesis:</strong> Generates images of a scene from viewpoints not directly captured.</li>
            <li><strong>Multiview geometry:</strong> Uses relationships between camera views to infer depth and structure.</li>
            <li><strong>Neural rendering:</strong> Uses neural networks to synthesize images from scene representations.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/3D_reconstruction" target="_blank" rel="noopener noreferrer" title="Wikipedia: 3D reconstruction">3D reconstruction</a>:</strong> Builds 3D structure from images, video, scans, or learned priors.</li>
            <li><strong>Text-to-3D:</strong> Generates 3D assets or scenes from language prompts.</li>
            <li><strong>Video generation:</strong> Produces temporally coherent frame sequences.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Simulation" target="_blank" rel="noopener noreferrer" title="Wikipedia: Simulation">World simulation</a>:</strong> Models dynamic scenes so agents can predict and interact with environments.</li>
          </ul>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            You should be able to connect classical image-processing tools to modern deep vision tasks, choose appropriate model families for recognition or geometry problems, and explain how 3D vision methods represent and render scenes.
          </p>
