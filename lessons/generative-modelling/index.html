    <template data-lesson-page data-eyebrow="Phase 12" data-title="12. Generative Modelling" data-summary="Generative modelling studies how models learn probability distributions well enough to sample new text, images, audio, latents, or structured data." data-article-class="phase-article">
        <section>
          <h2>Generator families</h2>
          <div class="lesson-graphic" aria-label="Generative model family map">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>Likelihood</strong>
                <span>Autoregressive models, VAEs, and flows define probability models directly or approximately.</span>
              </div>
              <div class="graphic-node">
                <strong>Adversarial</strong>
                <span>GANs train a generator against a discriminator that judges realism.</span>
              </div>
              <div class="graphic-node">
                <strong>Denoising and transport</strong>
                <span>Diffusion and flow matching learn paths from noise to data.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>12.1 Autoregressive models</h2>
          <p>Understand:</p>
          <div class="formula-display">
            <code>p(x) = prod_t p(x_t | x_&lt;t)</code>
          </div>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="topics/autoregressive-language-models/index.html">Autoregressive language models</a>:</strong> Generate one token at a time, conditioning each token on previous context.</li>
            <li><strong><a class="wiki-term" href="topics/pixelrnn-and-pixelcnn/index.html">PixelRNN and PixelCNN</a>:</strong> Generate images pixel by pixel using sequential or masked-convolution dependencies.</li>
            <li><strong><a class="wiki-term" href="topics/wavenet/index.html">WaveNet</a>:</strong> Generates audio samples autoregressively with dilated causal convolutions.</li>
            <li><strong><a class="wiki-term" href="topics/teacher-forcing/index.html">Teacher forcing</a>:</strong> Trains next-step prediction using the true previous tokens rather than the model's sampled tokens.</li>
            <li><strong><a class="wiki-term" href="topics/exposure-bias/index.html">Exposure bias</a>:</strong> Occurs when training sees clean histories but generation must handle its own mistakes.</li>
            <li><strong><a class="wiki-term" href="topics/causal-masking/index.html">Causal masking</a>:</strong> Prevents a model from attending to future tokens during autoregressive training.</li>
            <li><strong><a class="wiki-term" href="topics/sequence-likelihood/index.html">Sequence likelihood</a>:</strong> Scores a whole sequence as the product of conditional next-token probabilities.</li>
          </ul>
        </section>

        <section>
          <h2>12.2 Autoencoders and variational autoencoders</h2>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="topics/autoencoders/index.html">Autoencoders</a>:</strong> Compress inputs into latent codes and reconstruct them, learning useful internal representations.</li>
            <li><strong><a class="wiki-term" href="topics/denoising-autoencoders/index.html">Denoising autoencoders</a>:</strong> Reconstruct clean inputs from corrupted versions, encouraging robust features.</li>
            <li><strong><a class="wiki-term" href="topics/sparse-autoencoders/index.html">Sparse autoencoders</a>:</strong> Encourage only a small number of latent units to activate for each input.</li>
            <li><strong><a class="wiki-term" href="topics/contractive-autoencoders/index.html">Contractive autoencoders</a>:</strong> Penalize sensitivity so nearby inputs map to stable representations.</li>
            <li><strong><a class="wiki-term" href="topics/variational-autoencoders/index.html">Variational autoencoders</a>:</strong> Learn probabilistic latent variables and generate by sampling from the latent space.</li>
            <li><strong><a class="wiki-term" href="topics/beta-vae/index.html">beta-VAE</a>:</strong> Increases the KL penalty to encourage more disentangled latent factors.</li>
            <li><strong><a class="wiki-term" href="topics/vector-quantized-vae/index.html">Vector-quantized VAE</a>:</strong> Uses discrete latent codes selected from a learned codebook.</li>
            <li><strong><a class="wiki-term" href="topics/latent-variable-models/index.html">Latent-variable models</a>:</strong> Explain observed data through hidden variables that capture underlying causes or structure.</li>
          </ul>
          <p>VAE evidence lower bound:</p>
          <div class="formula-display">
            <code>log p_theta(x) &gt;= E_q_phi(z|x)[log p_theta(x | z)] - D_KL(q_phi(z | x) || p(z))</code>
          </div>
          <p>Reparameterization:</p>
          <div class="formula-display">
            <code>z = mu_phi(x) + sigma_phi(x) * epsilon, epsilon ~ N(0, I)</code>
          </div>
        </section>

        <section>
          <h2>12.3 Generative adversarial networks</h2>
          <p>Study:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="topics/gan/index.html">GAN</a>:</strong> Trains a generator to fool a discriminator that distinguishes real from fake samples.</li>
            <li><strong><a class="wiki-term" href="topics/conditional-gan/index.html">Conditional GAN</a>:</strong> Conditions generation on labels, text, images, or other controls.</li>
            <li><strong><a class="wiki-term" href="topics/dcgan/index.html">DCGAN</a>:</strong> Uses convolutional architectures to make GAN image generation more stable.</li>
            <li><strong><a class="wiki-term" href="topics/wasserstein-gan/index.html">Wasserstein GAN</a>:</strong> Uses an earth-mover distance objective to improve training behavior.</li>
            <li><strong><a class="wiki-term" href="topics/gradient-penalty/index.html">Gradient penalty</a>:</strong> Regularizes discriminator gradients to support stable Wasserstein training.</li>
            <li><strong><a class="wiki-term" href="topics/stylegan/index.html">StyleGAN</a>:</strong> Controls image generation through style-based latent modulation across layers.</li>
            <li><strong><a class="wiki-term" href="topics/cyclegan/index.html">CycleGAN</a>:</strong> Learns image-to-image translation without paired examples using cycle consistency.</li>
            <li><strong><a class="wiki-term" href="topics/mode-collapse/index.html">Mode collapse</a>:</strong> Happens when the generator produces limited variety despite diverse training data.</li>
            <li><strong><a class="wiki-term" href="topics/training-instability/index.html">Training instability</a>:</strong> GANs can oscillate or fail because generator and discriminator co-adapt.</li>
          </ul>
          <p>Original GAN objective:</p>
          <div class="formula-display">
            <code>min_G max_D E_x~p_data[log D(x)] + E_z~p(z)[log(1 - D(G(z)))]</code>
          </div>
        </section>

        <section>
          <h2>12.4 Normalizing flows</h2>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="topics/change-of-variables-formula/index.html">Change-of-variables formula</a>:</strong> Tracks how probability density changes under an invertible transformation.</li>
            <li><strong><a class="wiki-term" href="topics/coupling-layers/index.html">Coupling layers</a>:</strong> Split variables so part of the input transforms another part while remaining invertible.</li>
            <li><strong><a class="wiki-term" href="topics/nice/index.html">NICE</a>:</strong> An early flow model using additive coupling transformations.</li>
            <li><strong><a class="wiki-term" href="topics/realnvp/index.html">RealNVP</a>:</strong> Extends coupling layers with scaling and translation for more expressive flows.</li>
            <li><strong><a class="wiki-term" href="topics/glow/index.html">Glow</a>:</strong> Adds invertible 1x1 convolutions and multi-scale structure for image flows.</li>
            <li><strong><a class="wiki-term" href="topics/autoregressive-flows/index.html">Autoregressive flows</a>:</strong> Use autoregressive dependencies while preserving tractable density evaluation.</li>
            <li><strong><a class="wiki-term" href="topics/continuous-normalizing-flows/index.html">Continuous normalizing flows</a>:</strong> Define transformations through differential equations instead of discrete layers.</li>
          </ul>
          <div class="formula-display">
            <code>log p_X(x) = log p_Z(f(x)) + log |det df(x) / dx|</code>
          </div>
        </section>

        <section>
          <h2>12.5 Diffusion and score-based models</h2>
          <p>These are essential in a 2026 roadmap.</p>
          <p>Study:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="topics/denoising-diffusion-probabilistic-models/index.html">Denoising diffusion probabilistic models</a>:</strong> Learn to reverse a gradual noising process step by step.</li>
            <li><strong><a class="wiki-term" href="topics/noise-schedules/index.html">Noise schedules</a>:</strong> Choose how much noise is added at each diffusion timestep.</li>
            <li><strong><a class="wiki-term" href="topics/variance-preserving-and-variance-exploding-diffusion/index.html">Variance-preserving and variance-exploding diffusion</a>:</strong> Two ways to define how signal and noise scale over time.</li>
            <li><strong><a class="wiki-term" href="topics/score-matching/index.html">Score matching</a>:</strong> Learns gradients of the data density rather than the density itself.</li>
            <li><strong><a class="wiki-term" href="topics/denoising-score-matching/index.html">Denoising score matching</a>:</strong> Trains a model to predict how to move noisy samples toward clean data.</li>
            <li><strong><a class="wiki-term" href="topics/score-based-sdes/index.html">Score-based SDEs</a>:</strong> Formulate generation as reversing a stochastic differential equation.</li>
            <li><strong><a class="wiki-term" href="topics/classifier-guidance/index.html">Classifier guidance</a>:</strong> Uses an external classifier to steer diffusion samples toward a class.</li>
            <li><strong><a class="wiki-term" href="topics/classifier-free-guidance/index.html">Classifier-free guidance</a>:</strong> Steers generation by mixing conditional and unconditional model predictions.</li>
            <li><strong><a class="wiki-term" href="topics/latent-diffusion/index.html">Latent diffusion</a>:</strong> Runs diffusion in a compressed latent space instead of raw pixels.</li>
            <li><strong><a class="wiki-term" href="topics/diffusion-transformers/index.html">Diffusion transformers</a>:</strong> Use transformer blocks as the denoising network.</li>
            <li><strong><a class="wiki-term" href="topics/consistency-models/index.html">Consistency models</a>:</strong> Learn direct mappings that can generate high-quality samples in fewer steps.</li>
            <li><strong><a class="wiki-term" href="topics/distillation-and-fast-sampling/index.html">Distillation and fast sampling</a>:</strong> Compress slow samplers into fewer denoising steps.</li>
            <li><strong><a class="wiki-term" href="topics/diffusion-language-models/index.html">Diffusion language models</a>:</strong> Adapt denoising generation ideas to discrete or continuous text representations.</li>
          </ul>
          <p>Forward noising:</p>
          <div class="formula-display">
            <code>q(x_t | x_0) = N(sqrt(alpha_bar_t) x_0, (1 - alpha_bar_t) I)</code>
          </div>
          <p>Common noise-prediction objective:</p>
          <div class="formula-display">
            <code>L = E_x0,epsilon,t[||epsilon - epsilon_theta(x_t, t)||_2^2]</code>
          </div>
        </section>

        <section>
          <h2>12.6 Flow matching</h2>
          <p>
            Flow matching and rectified-flow methods are now important alternatives or complements to diffusion modelling.
          </p>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="topics/probability-paths/index.html">Probability paths</a>:</strong> Define a continuous route between simple noise and the data distribution.</li>
            <li><strong><a class="wiki-term" href="topics/conditional-flow-matching/index.html">Conditional flow matching</a>:</strong> Trains a velocity field that moves samples along conditional probability paths.</li>
            <li><strong><a class="wiki-term" href="topics/rectified-flow/index.html">Rectified flow</a>:</strong> Learns straighter paths from noise to data to reduce sampling steps.</li>
            <li><strong><a class="wiki-term" href="topics/neural-ordinary-differential-equations/index.html">Neural ordinary differential equations</a>:</strong> Represent transformations as continuous dynamics parameterized by neural networks.</li>
            <li><strong><a class="wiki-term" href="topics/optimal-transport-paths/index.html">Optimal-transport paths</a>:</strong> Move probability mass between distributions with transport-inspired geometry.</li>
            <li><strong><a class="wiki-term" href="topics/ode-solvers/index.html">ODE solvers</a>:</strong> Numerically integrate the learned velocity field during sampling.</li>
            <li><strong><a class="wiki-term" href="topics/distillation-to-fewer-steps/index.html">Distillation to fewer steps</a>:</strong> Trains a faster generator to match a slower multi-step process.</li>
          </ul>
          <p>Flow ODE:</p>
          <div class="formula-display">
            <code>dx_t / dt = v_theta(x_t, t)</code>
          </div>
          <p>Flow-matching loss:</p>
          <div class="formula-display">
            <code>L = E_t,x_t[||v_theta(x_t, t) - u_t(x_t)||_2^2]</code>
          </div>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            You should be able to compare likelihood-based, adversarial, flow-based, diffusion, and flow-matching generators by their training objective, sampling procedure, strengths, and failure modes.
          </p>
        </section>
