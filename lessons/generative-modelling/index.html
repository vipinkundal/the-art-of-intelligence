    <template data-lesson-page data-eyebrow="Phase 12" data-title="12. Generative Modelling" data-summary="Generative modelling studies how models learn probability distributions well enough to sample new text, images, audio, latents, or structured data." data-article-class="phase-article">
        <section>
          <h2>Generator families</h2>
          <div class="lesson-graphic" aria-label="Generative model family map">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>Likelihood</strong>
                <span>Autoregressive models, VAEs, and flows define probability models directly or approximately.</span>
              </div>
              <div class="graphic-node">
                <strong>Adversarial</strong>
                <span>GANs train a generator against a discriminator that judges realism.</span>
              </div>
              <div class="graphic-node">
                <strong>Denoising and transport</strong>
                <span>Diffusion and flow matching learn paths from noise to data.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>12.1 Autoregressive models</h2>
          <p>Understand:</p>
          <div class="formula-display">
            <code>p(x) = prod_t p(x_t | x_&lt;t)</code>
          </div>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong>Autoregressive language models:</strong> Generate one token at a time, conditioning each token on previous context.</li>
            <li><strong>PixelRNN and PixelCNN:</strong> Generate images pixel by pixel using sequential or masked-convolution dependencies.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/WaveNet" target="_blank" rel="noopener noreferrer" title="Wikipedia: WaveNet">WaveNet</a>:</strong> Generates audio samples autoregressively with dilated causal convolutions.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Teacher_forcing" target="_blank" rel="noopener noreferrer" title="Wikipedia: Teacher forcing">Teacher forcing</a>:</strong> Trains next-step prediction using the true previous tokens rather than the model's sampled tokens.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Exposure_compensation" target="_blank" rel="noopener noreferrer" title="Wikipedia: Exposure compensation">Exposure bias</a>:</strong> Occurs when training sees clean histories but generation must handle its own mistakes.</li>
            <li><strong>Causal masking:</strong> Prevents a model from attending to future tokens during autoregressive training.</li>
            <li><strong>Sequence likelihood:</strong> Scores a whole sequence as the product of conditional next-token probabilities.</li>
          </ul>
        </section>

        <section>
          <h2>12.2 Autoencoders and variational autoencoders</h2>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Autoencoder" target="_blank" rel="noopener noreferrer" title="Wikipedia: Autoencoder">Autoencoders</a>:</strong> Compress inputs into latent codes and reconstruct them, learning useful internal representations.</li>
            <li><strong>Denoising autoencoders:</strong> Reconstruct clean inputs from corrupted versions, encouraging robust features.</li>
            <li><strong>Sparse autoencoders:</strong> Encourage only a small number of latent units to activate for each input.</li>
            <li><strong>Contractive autoencoders:</strong> Penalize sensitivity so nearby inputs map to stable representations.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Variational_autoencoder" target="_blank" rel="noopener noreferrer" title="Wikipedia: Variational autoencoder">Variational autoencoders</a>:</strong> Learn probabilistic latent variables and generate by sampling from the latent space.</li>
            <li><strong>beta-VAE:</strong> Increases the KL penalty to encourage more disentangled latent factors.</li>
            <li><strong>Vector-quantized VAE:</strong> Uses discrete latent codes selected from a learned codebook.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Latent_variable_model" target="_blank" rel="noopener noreferrer" title="Wikipedia: Latent variable model">Latent-variable models</a>:</strong> Explain observed data through hidden variables that capture underlying causes or structure.</li>
          </ul>
          <p>VAE evidence lower bound:</p>
          <div class="formula-display">
            <code>log p_theta(x) &gt;= E_q_phi(z|x)[log p_theta(x | z)] - D_KL(q_phi(z | x) || p(z))</code>
          </div>
          <p>Reparameterization:</p>
          <div class="formula-display">
            <code>z = mu_phi(x) + sigma_phi(x) * epsilon, epsilon ~ N(0, I)</code>
          </div>
        </section>

        <section>
          <h2>12.3 Generative adversarial networks</h2>
          <p>Study:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Generative_adversarial_network" target="_blank" rel="noopener noreferrer" title="Wikipedia: Generative adversarial network">GAN</a>:</strong> Trains a generator to fool a discriminator that distinguishes real from fake samples.</li>
            <li><strong>Conditional GAN:</strong> Conditions generation on labels, text, images, or other controls.</li>
            <li><strong>DCGAN:</strong> Uses convolutional architectures to make GAN image generation more stable.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Wasserstein_GAN" target="_blank" rel="noopener noreferrer" title="Wikipedia: Wasserstein GAN">Wasserstein GAN</a>:</strong> Uses an earth-mover distance objective to improve training behavior.</li>
            <li><strong>Gradient penalty:</strong> Regularizes discriminator gradients to support stable Wasserstein training.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/StyleGAN" target="_blank" rel="noopener noreferrer" title="Wikipedia: StyleGAN">StyleGAN</a>:</strong> Controls image generation through style-based latent modulation across layers.</li>
            <li><strong>CycleGAN:</strong> Learns image-to-image translation without paired examples using cycle consistency.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Mode_collapse" target="_blank" rel="noopener noreferrer" title="Wikipedia: Mode collapse">Mode collapse</a>:</strong> Happens when the generator produces limited variety despite diverse training data.</li>
            <li><strong>Training instability:</strong> GANs can oscillate or fail because generator and discriminator co-adapt.</li>
          </ul>
          <p>Original GAN objective:</p>
          <div class="formula-display">
            <code>min_G max_D E_x~p_data[log D(x)] + E_z~p(z)[log(1 - D(G(z)))]</code>
          </div>
        </section>

        <section>
          <h2>12.4 Normalizing flows</h2>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong>Change-of-variables formula:</strong> Tracks how probability density changes under an invertible transformation.</li>
            <li><strong>Coupling layers:</strong> Split variables so part of the input transforms another part while remaining invertible.</li>
            <li><strong>NICE:</strong> An early flow model using additive coupling transformations.</li>
            <li><strong>RealNVP:</strong> Extends coupling layers with scaling and translation for more expressive flows.</li>
            <li><strong>Glow:</strong> Adds invertible 1x1 convolutions and multi-scale structure for image flows.</li>
            <li><strong>Autoregressive flows:</strong> Use autoregressive dependencies while preserving tractable density evaluation.</li>
            <li><strong>Continuous normalizing flows:</strong> Define transformations through differential equations instead of discrete layers.</li>
          </ul>
          <div class="formula-display">
            <code>log p_X(x) = log p_Z(f(x)) + log |det df(x) / dx|</code>
          </div>
        </section>

        <section>
          <h2>12.5 Diffusion and score-based models</h2>
          <p>These are essential in a 2026 roadmap.</p>
          <p>Study:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong>Denoising diffusion probabilistic models:</strong> Learn to reverse a gradual noising process step by step.</li>
            <li><strong>Noise schedules:</strong> Choose how much noise is added at each diffusion timestep.</li>
            <li><strong>Variance-preserving and variance-exploding diffusion:</strong> Two ways to define how signal and noise scale over time.</li>
            <li><strong>Score matching:</strong> Learns gradients of the data density rather than the density itself.</li>
            <li><strong>Denoising score matching:</strong> Trains a model to predict how to move noisy samples toward clean data.</li>
            <li><strong>Score-based SDEs:</strong> Formulate generation as reversing a stochastic differential equation.</li>
            <li><strong>Classifier guidance:</strong> Uses an external classifier to steer diffusion samples toward a class.</li>
            <li><strong>Classifier-free guidance:</strong> Steers generation by mixing conditional and unconditional model predictions.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Latent_diffusion_model" target="_blank" rel="noopener noreferrer" title="Wikipedia: Latent diffusion model">Latent diffusion</a>:</strong> Runs diffusion in a compressed latent space instead of raw pixels.</li>
            <li><strong>Diffusion transformers:</strong> Use transformer blocks as the denoising network.</li>
            <li><strong>Consistency models:</strong> Learn direct mappings that can generate high-quality samples in fewer steps.</li>
            <li><strong>Distillation and fast sampling:</strong> Compress slow samplers into fewer denoising steps.</li>
            <li><strong>Diffusion language models:</strong> Adapt denoising generation ideas to discrete or continuous text representations.</li>
          </ul>
          <p>Forward noising:</p>
          <div class="formula-display">
            <code>q(x_t | x_0) = N(sqrt(alpha_bar_t) x_0, (1 - alpha_bar_t) I)</code>
          </div>
          <p>Common noise-prediction objective:</p>
          <div class="formula-display">
            <code>L = E_x0,epsilon,t[||epsilon - epsilon_theta(x_t, t)||_2^2]</code>
          </div>
        </section>

        <section>
          <h2>12.6 Flow matching</h2>
          <p>
            Flow matching and rectified-flow methods are now important alternatives or complements to diffusion modelling.
          </p>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong>Probability paths:</strong> Define a continuous route between simple noise and the data distribution.</li>
            <li><strong>Conditional flow matching:</strong> Trains a velocity field that moves samples along conditional probability paths.</li>
            <li><strong>Rectified flow:</strong> Learns straighter paths from noise to data to reduce sampling steps.</li>
            <li><strong>Neural ordinary differential equations:</strong> Represent transformations as continuous dynamics parameterized by neural networks.</li>
            <li><strong>Optimal-transport paths:</strong> Move probability mass between distributions with transport-inspired geometry.</li>
            <li><strong>ODE solvers:</strong> Numerically integrate the learned velocity field during sampling.</li>
            <li><strong>Distillation to fewer steps:</strong> Trains a faster generator to match a slower multi-step process.</li>
          </ul>
          <p>Flow ODE:</p>
          <div class="formula-display">
            <code>dx_t / dt = v_theta(x_t, t)</code>
          </div>
          <p>Flow-matching loss:</p>
          <div class="formula-display">
            <code>L = E_t,x_t[||v_theta(x_t, t) - u_t(x_t)||_2^2]</code>
          </div>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            You should be able to compare likelihood-based, adversarial, flow-based, diffusion, and flow-matching generators by their training objective, sampling procedure, strengths, and failure modes.
          </p>
        </section>
