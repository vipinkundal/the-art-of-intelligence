        <section>
          <h2>5.1 Supervised learning</h2>
          <h3>Regression</h3>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Ordinary_least_squares" target="_blank" rel="noopener noreferrer" title="Wikipedia: Ordinary least squares">Ordinary least squares</a>:</strong> Fits a linear model by minimizing squared prediction error.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Polynomial_regression" target="_blank" rel="noopener noreferrer" title="Wikipedia: Polynomial regression">Polynomial regression</a>:</strong> Adds powers of input features so a linear model can fit curved relationships.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Ridge_regression" target="_blank" rel="noopener noreferrer" title="Wikipedia: Ridge regression">Ridge regression</a>:</strong> Adds an L2 penalty to shrink weights and reduce overfitting.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Lasso_(statistics)" target="_blank" rel="noopener noreferrer" title="Wikipedia: Lasso (statistics)">Lasso</a>:</strong> Adds an L1 penalty that can drive some feature weights to zero.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Elastic_net_regularization" target="_blank" rel="noopener noreferrer" title="Wikipedia: Elastic net regularization">Elastic net</a>:</strong> Combines L1 and L2 penalties for sparse but stable regression.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Generalized_linear_model" target="_blank" rel="noopener noreferrer" title="Wikipedia: Generalized linear model">Generalized linear models</a>:</strong> Extend linear regression to different output distributions and link functions.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Poisson_regression" target="_blank" rel="noopener noreferrer" title="Wikipedia: Poisson regression">Poisson regression</a>:</strong> Models count data such as events per time period.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Quantile_regression" target="_blank" rel="noopener noreferrer" title="Wikipedia: Quantile regression">Quantile regression</a>:</strong> Predicts conditional quantiles instead of only the mean.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Robust_regression" target="_blank" rel="noopener noreferrer" title="Wikipedia: Robust regression">Robust regression</a>:</strong> Reduces the influence of outliers compared with ordinary squared loss.</li>
            <li><strong>Gaussian-process regression:</strong> Uses a kernel-defined distribution over functions to predict with uncertainty.</li>
          </ul>
        </section>

        <section>
          <h2>Linear regression</h2>
          <div class="formula-display" aria-label="Linear regression prediction formula">
            <code>y_hat = Xw + b</code>
          </div>
        </section>

        <section>
          <h2>Mean squared error</h2>
          <div class="formula-display" aria-label="Mean squared error formula">
            <code>L = (1 / n) * sum_i (y_i - y_hat_i)^2</code>
          </div>
        </section>

        <section>
          <h2>Ridge objective</h2>
          <div class="formula-display" aria-label="Ridge regression objective">
            <code>min_w ||Xw - y||_2^2 + lambda ||w||_2^2</code>
          </div>
        </section>

        <section>
          <h2>Classification</h2>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Logistic_regression" target="_blank" rel="noopener noreferrer" title="Wikipedia: Logistic regression">Logistic regression</a>:</strong> A linear classifier that predicts class probability with a sigmoid link.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Multinomial_logistic_regression" target="_blank" rel="noopener noreferrer" title="Wikipedia: Multinomial logistic regression">Multinomial logistic regression</a>:</strong> Extends logistic regression to more than two classes with softmax probabilities.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Perceptron" target="_blank" rel="noopener noreferrer" title="Wikipedia: Perceptron">Perceptron</a>:</strong> An early online linear classifier updated when it makes mistakes.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/K-nearest_neighbors_algorithm" target="_blank" rel="noopener noreferrer" title="Wikipedia: K-nearest neighbors algorithm">k-nearest neighbours</a>:</strong> Predicts from the labels of the closest training examples.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Naive_Bayes_classifier" target="_blank" rel="noopener noreferrer" title="Wikipedia: Naive Bayes classifier">Naive Bayes</a>:</strong> Uses Bayes' theorem with a simplifying conditional-independence assumption.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Linear_discriminant_analysis" target="_blank" rel="noopener noreferrer" title="Wikipedia: Linear discriminant analysis">Linear discriminant analysis</a>:</strong> Classifies with Gaussian class models that share covariance.</li>
            <li><strong>Quadratic discriminant analysis:</strong> Allows each class to have its own covariance, producing curved boundaries.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Support_vector_machine" target="_blank" rel="noopener noreferrer" title="Wikipedia: Support vector machine">Support-vector machines</a>:</strong> Find a margin-maximizing decision boundary, often with hinge loss.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Kernel_method" target="_blank" rel="noopener noreferrer" title="Wikipedia: Kernel method">Kernel methods</a>:</strong> Compare examples through kernels so linear models can act in richer feature spaces.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Decision_tree_learning" target="_blank" rel="noopener noreferrer" title="Wikipedia: Decision tree learning">Decision trees</a>:</strong> Split features into rules that form an interpretable prediction tree.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Random_forest" target="_blank" rel="noopener noreferrer" title="Wikipedia: Random forest">Random forests</a>:</strong> Average many randomized trees to reduce variance.</li>
            <li><strong>Extremely randomized trees:</strong> Add more random splitting to decorrelate trees further.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/AdaBoost" target="_blank" rel="noopener noreferrer" title="Wikipedia: AdaBoost">AdaBoost</a>:</strong> Builds an ensemble by focusing later learners on previously misclassified examples.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Gradient_boosting" target="_blank" rel="noopener noreferrer" title="Wikipedia: Gradient boosting">Gradient boosting</a>:</strong> Adds weak learners that correct residual errors from the current ensemble.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/XGBoost" target="_blank" rel="noopener noreferrer" title="Wikipedia: XGBoost">XGBoost</a>:</strong> A regularized, optimized gradient-boosted tree system widely used on tabular data.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/LightGBM" target="_blank" rel="noopener noreferrer" title="Wikipedia: LightGBM">LightGBM</a>:</strong> A fast gradient-boosting library optimized for large datasets and categorical handling.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/CatBoost" target="_blank" rel="noopener noreferrer" title="Wikipedia: CatBoost">CatBoost</a>:</strong> Gradient boosting with strong categorical-feature handling and ordered boosting.</li>
            <li><strong>Probability calibration:</strong> Adjusts predicted probabilities so confidence matches observed frequencies.</li>
          </ul>
        </section>

        <section>
          <h2>Sigmoid</h2>
          <div class="formula-display" aria-label="Sigmoid formula">
            <code>sigma(z) = 1 / (1 + exp(-z))</code>
          </div>
        </section>

        <section>
          <h2>Softmax</h2>
          <div class="formula-display" aria-label="Softmax formula">
            <code>p_i = exp(z_i) / sum_j exp(z_j)</code>
          </div>
        </section>

        <section>
          <h2>Binary cross-entropy</h2>
          <div class="formula-display" aria-label="Binary cross entropy loss">
            <code>L = -(1 / n) * sum_i [y_i log p_i + (1 - y_i) log(1 - p_i)]</code>
          </div>
        </section>

        <section>
          <h2>Multiclass cross-entropy</h2>
          <div class="formula-display" aria-label="Multiclass cross entropy loss">
            <code>L = -sum_{c=1..C} y_c log p_c</code>
          </div>
        </section>

        <section>
          <h2>SVM objective</h2>
          <div class="formula-display" aria-label="Support vector machine objective">
            <code>min_{w,b} (1 / 2) ||w||^2 + C * sum_i max(0, 1 - y_i(w^T x_i + b))</code>
          </div>
        </section>

        <section>
          <h2>5.2 Unsupervised learning</h2>
          <h3>Clustering</h3>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/K-means_clustering" target="_blank" rel="noopener noreferrer" title="Wikipedia: K-means clustering">k-means and k-means++</a>:</strong> Partition data around centroids; k-means++ improves centroid initialization.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/K-medoids" target="_blank" rel="noopener noreferrer" title="Wikipedia: K-medoids">k-medoids</a>:</strong> Uses real data points as cluster centers, making it more robust to outliers.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Mixture_model" target="_blank" rel="noopener noreferrer" title="Wikipedia: Mixture model">Gaussian mixture models</a>:</strong> Represent clusters as a weighted mixture of Gaussian distributions.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Expectation%E2%80%93maximization_algorithm" target="_blank" rel="noopener noreferrer" title="Wikipedia: Expectation–maximization algorithm">Expectation-maximization</a>:</strong> Alternates between assigning soft cluster responsibility and updating parameters.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Hierarchical_clustering" target="_blank" rel="noopener noreferrer" title="Wikipedia: Hierarchical clustering">Agglomerative clustering</a>:</strong> Builds clusters bottom-up by repeatedly merging nearby groups.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Hierarchical_clustering" target="_blank" rel="noopener noreferrer" title="Wikipedia: Hierarchical clustering">Divisive clustering</a>:</strong> Starts with all data together and recursively splits groups apart.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/DBSCAN" target="_blank" rel="noopener noreferrer" title="Wikipedia: DBSCAN">DBSCAN</a>:</strong> Finds dense regions and marks isolated points as noise.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/DBSCAN" target="_blank" rel="noopener noreferrer" title="Wikipedia: DBSCAN">HDBSCAN</a>:</strong> Extends DBSCAN to handle clusters with varying density.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/OPTICS_algorithm" target="_blank" rel="noopener noreferrer" title="Wikipedia: OPTICS algorithm">OPTICS</a>:</strong> Orders points to reveal density-based clustering structure at multiple scales.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Mean_shift" target="_blank" rel="noopener noreferrer" title="Wikipedia: Mean shift">Mean shift</a>:</strong> Moves points toward local density peaks without choosing cluster count upfront.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Spectral_clustering" target="_blank" rel="noopener noreferrer" title="Wikipedia: Spectral clustering">Spectral clustering</a>:</strong> Uses graph eigenvectors to cluster data with non-convex structure.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Affinity_propagation" target="_blank" rel="noopener noreferrer" title="Wikipedia: Affinity propagation">Affinity propagation</a>:</strong> Passes messages between points to choose representative exemplars.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/BIRCH" target="_blank" rel="noopener noreferrer" title="Wikipedia: BIRCH">BIRCH</a>:</strong> Builds compact clustering summaries for large datasets.</li>
            <li><strong>Fuzzy c-means:</strong> Assigns each point partial membership in multiple clusters.</li>
          </ul>
        </section>

        <section>
          <h2>k-means objective</h2>
          <div class="formula-display" aria-label="k-means objective">
            <code>min_{mu_k} sum_i ||x_i - mu_{c_i}||_2^2</code>
          </div>
        </section>

        <section>
          <h2>Dimensionality reduction</h2>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Principal_component_analysis" target="_blank" rel="noopener noreferrer" title="Wikipedia: Principal component analysis">PCA</a>:</strong> Projects data onto directions of highest variance.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Kernel_principal_component_analysis" target="_blank" rel="noopener noreferrer" title="Wikipedia: Kernel principal component analysis">Kernel PCA</a>:</strong> Applies PCA in an implicit nonlinear feature space.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Independent_component_analysis" target="_blank" rel="noopener noreferrer" title="Wikipedia: Independent component analysis">Independent component analysis</a>:</strong> Separates signals into statistically independent components.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Non-negative_matrix_factorization" target="_blank" rel="noopener noreferrer" title="Wikipedia: Non-negative matrix factorization">Non-negative matrix factorization</a>:</strong> Decomposes non-negative data into additive parts.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Factor_analysis" target="_blank" rel="noopener noreferrer" title="Wikipedia: Factor analysis">Factor analysis</a>:</strong> Explains observed variables through fewer latent factors plus noise.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Random_projection" target="_blank" rel="noopener noreferrer" title="Wikipedia: Random projection">Random projections</a>:</strong> Reduces dimension with random matrices while approximately preserving distances.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Multidimensional_scaling" target="_blank" rel="noopener noreferrer" title="Wikipedia: Multidimensional scaling">Multidimensional scaling</a>:</strong> Places points in low dimensions to preserve pairwise distances.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Isomap" target="_blank" rel="noopener noreferrer" title="Wikipedia: Isomap">Isomap</a>:</strong> Preserves manifold geodesic distances rather than straight-line distances.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Nonlinear_dimensionality_reduction" target="_blank" rel="noopener noreferrer" title="Wikipedia: Nonlinear dimensionality reduction">Locally linear embedding</a>:</strong> Preserves local neighbor reconstruction relationships in a low-dimensional map.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/T-distributed_stochastic_neighbor_embedding" target="_blank" rel="noopener noreferrer" title="Wikipedia: T-distributed stochastic neighbor embedding">t-SNE</a>:</strong> Visualizes local neighborhoods by emphasizing nearby relationships.</li>
            <li><strong>UMAP:</strong> Builds a neighborhood graph and optimizes a low-dimensional embedding.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Autoencoder" target="_blank" rel="noopener noreferrer" title="Wikipedia: Autoencoder">Autoencoders</a>:</strong> Learn nonlinear compressed representations through reconstruction.</li>
          </ul>
          <p>
            Use t-SNE and UMAP mainly for exploratory visualization; do not treat distances in their 2D plots as definitive evidence.
          </p>
        </section>

        <section>
          <h2>Other unsupervised methods</h2>
          <p>Include:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong>Topic modelling with latent Dirichlet allocation:</strong> Represents documents as mixtures of latent topics.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Matrix_decomposition" target="_blank" rel="noopener noreferrer" title="Wikipedia: Matrix decomposition">Matrix factorization</a>:</strong> Decomposes a matrix into lower-dimensional factors, common in recommendations.</li>
            <li><strong>Collaborative filtering:</strong> Predicts preferences from user-item interaction patterns.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Apriori_algorithm" target="_blank" rel="noopener noreferrer" title="Wikipedia: Apriori algorithm">Apriori</a>:</strong> Mines frequent itemsets by expanding only candidates whose subsets are frequent.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Association_rule_learning" target="_blank" rel="noopener noreferrer" title="Wikipedia: Association rule learning">FP-growth</a>:</strong> Mines frequent patterns with a compressed tree representation.</li>
            <li><strong>ECLAT:</strong> Mines frequent itemsets using vertical transaction-id sets.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Isolation_forest" target="_blank" rel="noopener noreferrer" title="Wikipedia: Isolation forest">Isolation forest</a>:</strong> Detects anomalies by how easily random splits isolate them.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Local_outlier_factor" target="_blank" rel="noopener noreferrer" title="Wikipedia: Local outlier factor">Local outlier factor</a>:</strong> Scores points that are sparse relative to their local neighborhood.</li>
            <li><strong>One-class SVM:</strong> Learns a boundary around normal examples to detect novelty.</li>
            <li><strong>Robust covariance estimation:</strong> Estimates covariance while reducing the influence of outliers.</li>
          </ul>
        </section>

        <section>
          <h2>5.3 Evaluation and generalization</h2>
          <p>Learn:</p>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong>Train, validation and test splits:</strong> Separate data for fitting, tuning, and final unbiased evaluation.</li>
            <li><strong>Cross-validation:</strong> Repeats training over different folds to estimate performance more reliably.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Stratified_sampling" target="_blank" rel="noopener noreferrer" title="Wikipedia: Stratified sampling">Stratified sampling</a>:</strong> Preserves class proportions across splits or batches.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Leakage_(machine_learning)" target="_blank" rel="noopener noreferrer" title="Wikipedia: Leakage (machine learning)">Data leakage</a>:</strong> Occurs when training indirectly sees information that should only be available at evaluation or deployment time.</li>
            <li><strong>Overfitting and underfitting:</strong> Overfitting memorizes noise; underfitting misses real structure.</li>
            <li><strong>Regularization:</strong> Adds constraints or penalties to improve generalization.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Learning_curve" target="_blank" rel="noopener noreferrer" title="Wikipedia: Learning curve">Learning curves</a>:</strong> Plot performance versus data size or training progress to diagnose bias and variance.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Hyperparameter_optimization" target="_blank" rel="noopener noreferrer" title="Wikipedia: Hyperparameter optimization">Hyperparameter optimization</a>:</strong> Searches settings that are not learned directly by the model.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Hyperparameter_optimization" target="_blank" rel="noopener noreferrer" title="Wikipedia: Hyperparameter optimization">Grid search</a>:</strong> Tests a fixed grid of hyperparameter combinations.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Random_search" target="_blank" rel="noopener noreferrer" title="Wikipedia: Random search">Random search</a>:</strong> Samples combinations and often covers useful ranges more efficiently than grids.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Bayesian_optimization" target="_blank" rel="noopener noreferrer" title="Wikipedia: Bayesian optimization">Bayesian optimization</a>:</strong> Uses a surrogate model to choose promising hyperparameters.</li>
            <li><strong>Successive halving:</strong> Allocates more resources to promising configurations and stops weak ones early.</li>
            <li><strong>Population-based training:</strong> Evolves hyperparameters while training multiple models in parallel.</li>
          </ul>
        </section>

        <section>
          <h2>Classification metrics</h2>
          <div class="formula-stack">
            <div class="formula-row">
              <span>Precision</span>
              <code>Precision = TP / (TP + FP)</code>
            </div>
            <div class="formula-row">
              <span>Recall</span>
              <code>Recall = TP / (TP + FN)</code>
            </div>
            <div class="formula-row">
              <span>F1</span>
              <code>F1 = 2 * Precision * Recall / (Precision + Recall)</code>
            </div>
          </div>
        </section>

        <section>
          <h2>Also understand</h2>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Accuracy_and_precision" target="_blank" rel="noopener noreferrer" title="Wikipedia: Accuracy and precision">Accuracy</a>:</strong> Fraction of predictions that are correct, best when classes are balanced.</li>
            <li><strong>Balanced accuracy:</strong> Averages recall across classes to handle imbalance.</li>
            <li><strong>Specificity:</strong> Measures how well negatives are correctly identified.</li>
            <li><strong>ROC-AUC:</strong> Measures ranking quality across true-positive and false-positive trade-offs.</li>
            <li><strong>PR-AUC:</strong> Focuses on precision-recall trade-offs, useful for rare positive classes.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Cross-entropy" target="_blank" rel="noopener noreferrer" title="Wikipedia: Cross-entropy">Log loss</a>:</strong> Penalizes confident wrong probabilities more heavily.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Brier_score" target="_blank" rel="noopener noreferrer" title="Wikipedia: Brier score">Brier score</a>:</strong> Measures squared error of predicted probabilities.</li>
            <li><strong>Expected calibration error:</strong> Summarizes mismatch between confidence and observed accuracy.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Phi_coefficient" target="_blank" rel="noopener noreferrer" title="Wikipedia: Phi coefficient">Matthews correlation coefficient</a>:</strong> A balanced classification score using all confusion-matrix cells.</li>
            <li><strong>Confusion matrices:</strong> Break predictions into true positives, false positives, true negatives, and false negatives.</li>
            <li><strong>Cost-sensitive evaluation:</strong> Scores errors according to their real-world cost, not just their count.</li>
          </ul>
        </section>

        <section>
          <h2>Regression metrics</h2>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Mean_absolute_error" target="_blank" rel="noopener noreferrer" title="Wikipedia: Mean absolute error">MAE</a>:</strong> Mean absolute error measures average absolute prediction mistake.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Mean_squared_error" target="_blank" rel="noopener noreferrer" title="Wikipedia: Mean squared error">MSE</a>:</strong> Mean squared error penalizes larger errors more strongly.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Root_mean_square_deviation" target="_blank" rel="noopener noreferrer" title="Wikipedia: Root mean square deviation">RMSE</a>:</strong> Square root of MSE, reported in the same units as the target.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Coefficient_of_determination" target="_blank" rel="noopener noreferrer" title="Wikipedia: Coefficient of determination">R^2</a>:</strong> Measures variance explained relative to a constant baseline.</li>
            <li><strong>MAPE and its limitations:</strong> Percentage error is intuitive but unstable near zero targets.</li>
            <li><strong>Quantile loss:</strong> Evaluates predictions of a chosen quantile rather than the mean.</li>
          </ul>
        </section>

        <section>
          <h2>Ranking and retrieval metrics</h2>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Precision_and_recall" target="_blank" rel="noopener noreferrer" title="Wikipedia: Precision and recall">Precision@k</a>:</strong> Fraction of the top k results that are relevant.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Precision_and_recall" target="_blank" rel="noopener noreferrer" title="Wikipedia: Precision and recall">Recall@k</a>:</strong> Fraction of all relevant results found within the top k.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Mean_reciprocal_rank" target="_blank" rel="noopener noreferrer" title="Wikipedia: Mean reciprocal rank">Mean reciprocal rank</a>:</strong> Rewards systems that place the first relevant result early.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Evaluation_measures_(information_retrieval)" target="_blank" rel="noopener noreferrer" title="Wikipedia: Evaluation measures (information retrieval)">Mean average precision</a>:</strong> Averages precision at the ranks where relevant items appear.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Discounted_cumulative_gain" target="_blank" rel="noopener noreferrer" title="Wikipedia: Discounted cumulative gain">NDCG</a>:</strong> Rewards highly relevant items appearing near the top of a ranked list.</li>
          </ul>
        </section>
