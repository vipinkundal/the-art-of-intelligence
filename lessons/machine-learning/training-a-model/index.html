    <template data-lesson-page data-eyebrow="Machine Learning" data-title="Training A Model" data-summary="Training is the process of showing a model examples so it can adjust itself and get better at a task.">
        <section>
          <h2>The simple idea</h2>
          <p>
            A model starts with weak guesses. During training, it compares its guesses with the correct answers, measures the error, and updates itself to reduce that error.
          </p>
          <div class="lesson-graphic" aria-label="Training loop">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>Guess</strong>
                <span>The model predicts an answer from the current parameters and the example input.</span>
              </div>
              <div class="graphic-node">
                <strong>Measure loss</strong>
                <span>The training code compares the prediction with the target and scores the error.</span>
              </div>
              <div class="graphic-node">
                <strong>Update</strong>
                <span>The optimizer changes parameters so future predictions should make less error.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>Important terms</h2>
          <ul class="lesson-list topic-detail-list">
            <li><strong>Example:</strong> One training case, such as a row, image, sentence, clip, or record that gives the model something to learn from.</li>
            <li><strong>Label:</strong> The target answer attached to an example, such as the class name, price, next token, rating, or human preference.</li>
            <li><strong>Loss:</strong> A numeric error score. Lower loss means the model's output better matches the training target under the chosen objective.</li>
          </ul>
        </section>

        <section>
          <h2>Example</h2>
          <p>
            To train a model that predicts house prices, you show it many houses with size, location, room count, and final sale price.
          </p>
        </section>

        <section>
          <h2>Why it matters for AI</h2>
          <p>
            Training is the step where data changes model behavior. Understanding it helps you reason about errors, overfitting, evaluation, and why better examples can improve predictions.
          </p>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            You should be able to describe the training loop in plain language: make a guess, measure loss, update the model, and check whether performance improves.
          </p>
        </section>
