    <template data-lesson-page data-eyebrow="1. Mathematical Foundations" data-title="1.2 Calculus And Matrix Calculus" data-summary="Calculus explains how quantities change. Matrix calculus extends that idea to vectors, matrices, losses, gradients, Jacobians, and Hessians, which are central to training AI models.">
        <section>
          <h2>The simple idea</h2>
          <p>
            Calculus gives AI a way to ask: if we change an input, parameter, or weight a little, how does the output or loss change? Optimization uses that answer to improve models.
          </p>
          <div class="lesson-graphic" aria-label="Calculus learning flow">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>Change</strong>
                <span>Derivatives measure how one quantity responds when another quantity moves.</span>
              </div>
              <div class="graphic-node">
                <strong>Sensitivity</strong>
                <span>Gradients, Jacobians, and Hessians scale the idea to many inputs and outputs.</span>
              </div>
              <div class="graphic-node">
                <strong>Training</strong>
                <span>Backpropagation uses these sensitivities to update model weights.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>Learn</h2>
          <ul class="lesson-list two-column-list topic-detail-list">
            <li><strong><a class="wiki-term" href="../topics/limits-and-continuity/index.html">Limits and continuity</a>:</strong> Limits describe behavior near a point, and continuity means small input changes do not cause jumps.</li>
            <li><strong><a class="wiki-term" href="../topics/derivatives-and-partial-derivatives/index.html">Derivatives and partial derivatives</a>:</strong> Derivatives measure change; partial derivatives isolate one variable while holding others fixed.</li>
            <li><strong><a class="wiki-term" href="../topics/product-quotient-and-chain-rules/index.html">Product, quotient, and chain rules</a>:</strong> These rules break complex derivatives into manageable pieces, especially through nested functions.</li>
            <li><strong><a class="wiki-term" href="../topics/gradients/index.html">Gradients</a>:</strong> A gradient collects partial derivatives and points in the direction of steepest local increase.</li>
            <li><strong><a class="wiki-term" href="../topics/directional-derivatives/index.html">Directional derivatives</a>:</strong> These measure how a function changes along one chosen direction instead of all directions.</li>
            <li><strong><a class="wiki-term" href="../topics/jacobians/index.html">Jacobians</a>:</strong> A Jacobian stores first-order derivatives for vector-valued functions, tracking how each output changes with each input.</li>
            <li><strong><a class="wiki-term" href="../topics/hessians/index.html">Hessians</a>:</strong> A Hessian stores second-order derivatives and describes curvature, sharpness, and local optimization geometry.</li>
            <li><strong><a class="wiki-term" href="../topics/taylor-approximation/index.html">Taylor approximation</a>:</strong> Taylor formulas approximate a function near a point using value, slope, and sometimes curvature.</li>
            <li><strong><a class="wiki-term" href="../topics/multivariable-integration/index.html">Multivariable integration</a>:</strong> Integrates quantities over areas, volumes, or higher-dimensional spaces.</li>
            <li><strong><a class="wiki-term" href="../topics/change-of-variables/index.html">Change of variables</a>:</strong> Re-expresses integrals or densities in new coordinates while correcting for volume distortion.</li>
            <li><strong><a class="wiki-term" href="../topics/ordinary-differential-equations/index.html">Ordinary differential equations</a>:</strong> Describe systems whose state changes over continuous time according to deterministic rules.</li>
            <li><strong><a class="wiki-term" href="../topics/stochastic-differential-equations/index.html">Stochastic differential equations</a>:</strong> Add random noise to continuous-time dynamics, useful for diffusion and uncertainty models.</li>
            <li><strong><a class="wiki-term" href="../topics/automatic-differentiation/index.html">Automatic differentiation</a>:</strong> Computes exact derivatives of programs by applying calculus rules to the computation graph.</li>
            <li><strong><a class="wiki-term" href="../topics/forward-mode-and-reverse-mode-autodiff/index.html">Forward-mode and reverse-mode autodiff</a>:</strong> Forward mode is efficient for few inputs; reverse mode is efficient for many parameters and one loss.</li>
          </ul>
        </section>

        <section>
          <h2>Essential formulas</h2>
          <div class="formula-stack" aria-label="Essential calculus and matrix calculus formulas">
            <div class="formula-row">
              <span>Chain rule</span>
              <code>dL/dx = (dL/dy)(dy/dx)</code>
            </div>
            <div class="formula-row">
              <span>First-order Taylor approximation</span>
              <code>f(x + Delta x) ~= f(x) + grad f(x)^T Delta x</code>
            </div>
            <div class="formula-row">
              <span>Second-order approximation</span>
              <code>f(x + Delta x) ~= f(x) + grad f(x)^T Delta x + 1/2 Delta x^T H_f(x) Delta x</code>
            </div>
          </div>
        </section>

        <section>
          <h2>Why it matters for AI</h2>
          <p>
            Training models means changing parameters to reduce a loss. Gradients tell us the direction of change, Jacobians describe vector-valued sensitivity, and Hessians describe curvature.
          </p>
          <p>
            Backpropagation is mostly the repeated application of the chain rule over a computational graph.
          </p>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            After this lesson, you should be able to explain gradients, partial derivatives, Jacobians, Hessians, Taylor approximations, and why reverse-mode automatic differentiation is useful for neural network training.
          </p>
        </section>
