    <template data-lesson-page data-eyebrow="1. Mathematical Foundations" data-title="1.7 Discrete Mathematics And Theoretical Computer Science" data-summary="Discrete mathematics gives AI the language of sets, graphs, logic, proofs, algorithms, and complexity. It becomes important when systems need to search, plan, reason symbolically, represent knowledge, or choose efficient procedures.">
        <section>
          <h2>Study</h2>
          <ul class="lesson-list two-column-list topic-detail-list">
            <li><strong>Sets, relations, and functions:</strong> Basic objects for describing collections, mappings, and relationships between entities.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Boolean_algebra" target="_blank" rel="noopener noreferrer" title="Wikipedia: Boolean algebra">Boolean algebra</a>:</strong> The math of true/false logic, used in conditions, circuits, constraints, and symbolic reasoning.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Combinatorics" target="_blank" rel="noopener noreferrer" title="Wikipedia: Combinatorics">Combinatorics</a>:</strong> Counts arrangements, choices, and possibilities, which matters in search spaces and probability.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Graph_theory" target="_blank" rel="noopener noreferrer" title="Wikipedia: Graph theory">Graph theory</a>:</strong> Represents entities as nodes and relationships as edges, useful for networks, dependencies, and knowledge graphs.</li>
            <li><strong>Trees and directed acyclic graphs:</strong> Structured graphs that model hierarchies, computation graphs, parse trees, and pipelines.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Recurrence_relation" target="_blank" rel="noopener noreferrer" title="Wikipedia: Recurrence relation">Recurrence relations</a>:</strong> Define values in terms of previous values, common in algorithms and dynamic programming.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Mathematical_induction" target="_blank" rel="noopener noreferrer" title="Wikipedia: Mathematical induction">Mathematical induction</a>:</strong> Proves a claim for all cases by proving a base case and a step from one case to the next.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Reductio_ad_absurdum" target="_blank" rel="noopener noreferrer" title="Wikipedia: Reductio ad absurdum">Proof by contradiction</a>:</strong> Proves a claim by showing the opposite assumption leads to an impossibility.</li>
            <li><strong>Automata and formal languages:</strong> Model machines and grammars that recognize structured symbol sequences.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Computability" target="_blank" rel="noopener noreferrer" title="Wikipedia: Computability">Computability</a>:</strong> Studies what can or cannot be solved by algorithms at all.</li>
            <li><strong>Time and space complexity:</strong> Measures how computation and memory grow as input size increases.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Reductions" target="_blank" rel="noopener noreferrer" title="Wikipedia: Reductions">Reductions</a>:</strong> Transform one problem into another to compare difficulty or reuse solvers.</li>
            <li><strong>P, NP, NP-hard, and NP-complete:</strong> Complexity classes that describe which problems are efficiently solvable or likely hard.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Approximation_algorithm" target="_blank" rel="noopener noreferrer" title="Wikipedia: Approximation algorithm">Approximation algorithms</a>:</strong> Find near-good solutions when exact optimization is too expensive.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Randomized_algorithm" target="_blank" rel="noopener noreferrer" title="Wikipedia: Randomized algorithm">Randomized algorithms</a>:</strong> Use randomness to simplify logic, improve average performance, or estimate hard quantities.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Online_algorithm" target="_blank" rel="noopener noreferrer" title="Wikipedia: Online algorithm">Online algorithms</a>:</strong> Make decisions as data arrives without knowing the future.</li>
          </ul>
        </section>

        <section>
          <h2>The simple idea</h2>
          <p>
            Continuous math helps describe quantities that vary smoothly. Discrete math helps describe objects that are separate: nodes in a graph, states in an automaton, rules in logic, symbols in a language, and steps in an algorithm.
          </p>
          <div class="lesson-graphic" aria-label="Discrete math flow">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>Objects</strong>
                <span>Sets, symbols, states, nodes, rules, and choices define the problem space.</span>
              </div>
              <div class="graphic-node">
                <strong>Structure</strong>
                <span>Graphs, automata, recurrences, and logic describe how objects relate.</span>
              </div>
              <div class="graphic-node">
                <strong>Cost</strong>
                <span>Complexity theory tells whether exact solutions are practical or approximations are needed.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>Why it matters for AI</h2>
          <p>
            This material becomes important in search, planning, symbolic reasoning, knowledge graphs, program synthesis, and AI systems design.
          </p>
          <p>
            Graphs can represent relationships between facts, recurrence relations describe repeated computation, and complexity theory helps explain why some tasks need approximations or heuristics instead of exact solutions.
          </p>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            After this lesson, you should be able to model a problem with sets or graphs, reason about correctness with induction or contradiction, and describe the time and space cost of an algorithm.
          </p>
        </section>
