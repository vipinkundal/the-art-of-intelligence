    <template data-lesson-page data-eyebrow="1. Mathematical Foundations" data-title="1.7 Discrete Mathematics And Theoretical Computer Science" data-summary="Discrete mathematics gives AI the language of sets, graphs, logic, proofs, algorithms, and complexity. It becomes important when systems need to search, plan, reason symbolically, represent knowledge, or choose efficient procedures.">
        <section>
          <h2>Study</h2>
          <ul class="lesson-list two-column-list topic-detail-list">
            <li><strong><a class="wiki-term" href="../topics/sets-relations-and-functions/index.html">Sets, relations, and functions</a>:</strong> Basic objects for describing collections, mappings, and relationships between entities.</li>
            <li><strong><a class="wiki-term" href="../topics/boolean-algebra/index.html">Boolean algebra</a>:</strong> The math of true/false logic, used in conditions, circuits, constraints, and symbolic reasoning.</li>
            <li><strong><a class="wiki-term" href="../topics/combinatorics/index.html">Combinatorics</a>:</strong> Counts arrangements, choices, and possibilities, which matters in search spaces and probability.</li>
            <li><strong><a class="wiki-term" href="../topics/graph-theory/index.html">Graph theory</a>:</strong> Represents entities as nodes and relationships as edges, useful for networks, dependencies, and knowledge graphs.</li>
            <li><strong><a class="wiki-term" href="../topics/trees-and-directed-acyclic-graphs/index.html">Trees and directed acyclic graphs</a>:</strong> Structured graphs that model hierarchies, computation graphs, parse trees, and pipelines.</li>
            <li><strong><a class="wiki-term" href="../topics/recurrence-relations/index.html">Recurrence relations</a>:</strong> Define values in terms of previous values, common in algorithms and dynamic programming.</li>
            <li><strong><a class="wiki-term" href="../topics/mathematical-induction/index.html">Mathematical induction</a>:</strong> Proves a claim for all cases by proving a base case and a step from one case to the next.</li>
            <li><strong><a class="wiki-term" href="../topics/proof-by-contradiction/index.html">Proof by contradiction</a>:</strong> Proves a claim by showing the opposite assumption leads to an impossibility.</li>
            <li><strong><a class="wiki-term" href="../topics/automata-and-formal-languages/index.html">Automata and formal languages</a>:</strong> Model machines and grammars that recognize structured symbol sequences.</li>
            <li><strong><a class="wiki-term" href="../topics/computability/index.html">Computability</a>:</strong> Studies what can or cannot be solved by algorithms at all.</li>
            <li><strong><a class="wiki-term" href="../topics/time-and-space-complexity/index.html">Time and space complexity</a>:</strong> Measures how computation and memory grow as input size increases.</li>
            <li><strong><a class="wiki-term" href="../topics/reductions/index.html">Reductions</a>:</strong> Transform one problem into another to compare difficulty or reuse solvers.</li>
            <li><strong><a class="wiki-term" href="../topics/p-np-np-hard-and-np-complete/index.html">P, NP, NP-hard, and NP-complete</a>:</strong> Complexity classes that describe which problems are efficiently solvable or likely hard.</li>
            <li><strong><a class="wiki-term" href="../topics/approximation-algorithms/index.html">Approximation algorithms</a>:</strong> Find near-good solutions when exact optimization is too expensive.</li>
            <li><strong><a class="wiki-term" href="../topics/randomized-algorithms/index.html">Randomized algorithms</a>:</strong> Use randomness to simplify logic, improve average performance, or estimate hard quantities.</li>
            <li><strong><a class="wiki-term" href="../topics/online-algorithms/index.html">Online algorithms</a>:</strong> Make decisions as data arrives without knowing the future.</li>
          </ul>
        </section>

        <section>
          <h2>The simple idea</h2>
          <p>
            Continuous math helps describe quantities that vary smoothly. Discrete math helps describe objects that are separate: nodes in a graph, states in an automaton, rules in logic, symbols in a language, and steps in an algorithm.
          </p>
          <div class="lesson-graphic" aria-label="Discrete math flow">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>Objects</strong>
                <span>Sets, symbols, states, nodes, rules, and choices define the problem space.</span>
              </div>
              <div class="graphic-node">
                <strong>Structure</strong>
                <span>Graphs, automata, recurrences, and logic describe how objects relate.</span>
              </div>
              <div class="graphic-node">
                <strong>Cost</strong>
                <span>Complexity theory tells whether exact solutions are practical or approximations are needed.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>Why it matters for AI</h2>
          <p>
            This material becomes important in search, planning, symbolic reasoning, knowledge graphs, program synthesis, and AI systems design.
          </p>
          <p>
            Graphs can represent relationships between facts, recurrence relations describe repeated computation, and complexity theory helps explain why some tasks need approximations or heuristics instead of exact solutions.
          </p>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            After this lesson, you should be able to model a problem with sets or graphs, reason about correctness with induction or contradiction, and describe the time and space cost of an algorithm.
          </p>
        </section>
