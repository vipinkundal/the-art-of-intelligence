    <template data-lesson-page data-eyebrow="1. Mathematical Foundations" data-title="1.6 Information Theory" data-summary="Information theory measures uncertainty, surprise, compression, and information flow. It is central to classification, language modelling, generative modelling, compression, and representation learning.">
        <section>
          <h2>The simple idea</h2>
          <p>
            Information theory asks how much uncertainty remains, how surprising an outcome is, and how much one variable tells us about another. AI uses those ideas in losses, model evaluation, compression, and learned representations.
          </p>
          <div class="lesson-graphic" aria-label="Information theory flow">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>Uncertainty</strong>
                <span>Entropy measures how many outcomes remain plausible before seeing data.</span>
              </div>
              <div class="graphic-node">
                <strong>Mismatch</strong>
                <span>Cross-entropy and KL divergence compare target and model distributions.</span>
              </div>
              <div class="graphic-node">
                <strong>Compression</strong>
                <span>Good representations keep useful signal while discarding avoidable noise.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>Learn</h2>
          <ul class="lesson-list two-column-list topic-detail-list">
            <li><strong><a class="wiki-term" href="../topics/entropy/index.html">Entropy</a>:</strong> Measures the uncertainty or average surprise in a probability distribution.</li>
            <li><strong><a class="wiki-term" href="../topics/cross-entropy/index.html">Cross-entropy</a>:</strong> Measures how costly it is to encode true outcomes using a model's predicted distribution.</li>
            <li><strong><a class="wiki-term" href="../topics/kl-divergence/index.html">KL divergence</a>:</strong> Measures how much one distribution differs from another, with direction-dependent penalties.</li>
            <li><strong><a class="wiki-term" href="../topics/mutual-information/index.html">Mutual information</a>:</strong> Measures how much knowing one variable reduces uncertainty about another.</li>
            <li><strong><a class="wiki-term" href="../topics/conditional-entropy/index.html">Conditional entropy</a>:</strong> Measures remaining uncertainty in one variable after another variable is known.</li>
            <li><strong><a class="wiki-term" href="../topics/jensen-shannon-divergence/index.html">Jensen-Shannon divergence</a>:</strong> A symmetric, smoothed way to compare probability distributions.</li>
            <li><strong><a class="wiki-term" href="../topics/coding-theory/index.html">Coding theory</a>:</strong> Connects probability to efficient representation, compression, and error correction.</li>
            <li><strong><a class="wiki-term" href="../topics/minimum-description-length/index.html">Minimum description length</a>:</strong> Prefers models that explain data well without requiring overly complex descriptions.</li>
            <li><strong><a class="wiki-term" href="../topics/rate-distortion-theory/index.html">Rate-distortion theory</a>:</strong> Studies the trade-off between compression rate and acceptable reconstruction error.</li>
            <li><strong><a class="wiki-term" href="../topics/perplexity/index.html">Perplexity</a>:</strong> Interprets language-model uncertainty as the effective number of plausible next choices.</li>
            <li><strong><a class="wiki-term" href="../topics/information-bottleneck/index.html">Information bottleneck</a>:</strong> Learns compressed representations that preserve information relevant to a target.</li>
          </ul>
        </section>

        <section>
          <h2>Essential formulas</h2>
          <div class="formula-stack" aria-label="Essential information theory formulas">
            <div class="formula-row">
              <span>Entropy</span>
              <code>H(p) = - sum_x p(x) log p(x)</code>
            </div>
            <div class="formula-row">
              <span>Cross-entropy</span>
              <code>H(p, q) = - sum_x p(x) log q(x)</code>
            </div>
            <div class="formula-row">
              <span>KL divergence</span>
              <code>D_KL(p || q) = sum_x p(x) log(p(x) / q(x))</code>
            </div>
            <div class="formula-row">
              <span>Mutual information</span>
              <code>I(X; Y) = D_KL(p(x, y) || p(x)p(y))</code>
            </div>
          </div>
        </section>

        <section>
          <h2>Why it matters for AI</h2>
          <p>
            Classification and language models often train with cross-entropy. Generative models compare distributions, compress information, and learn representations that preserve useful signals while discarding noise.
          </p>
          <p>
            Perplexity summarizes how uncertain a language model is, KL divergence compares probability distributions, and mutual information helps reason about dependence between variables.
          </p>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            After this lesson, you should be able to explain entropy, cross-entropy, KL divergence, mutual information, perplexity, and why information bottlenecks matter for representation learning.
          </p>
        </section>
