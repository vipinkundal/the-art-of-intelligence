    <template data-lesson-page data-eyebrow="1. Mathematical Foundations" data-title="1.1 Linear Algebra" data-summary="Linear algebra is the language of vectors, matrices, tensors, transformations, and high-dimensional geometry. It appears everywhere in AI, from embeddings and neural network weights to PCA and attention.">
        <section>
          <h2>The simple idea</h2>
          <p>
            Linear algebra gives AI systems a way to store information as numbers and transform those numbers while preserving useful structure such as direction, distance, similarity, and rank.
          </p>
          <div class="lesson-graphic" aria-label="Linear algebra concept flow">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>Represent</strong>
                <span>Vectors, matrices, and tensors turn raw data into structured numeric objects.</span>
              </div>
              <div class="graphic-node">
                <strong>Transform</strong>
                <span>Matrix multiplication, projections, and decompositions move data into useful spaces.</span>
              </div>
              <div class="graphic-node">
                <strong>Compare</strong>
                <span>Norms, distances, dot products, and angles measure similarity and error.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>You should understand</h2>
          <ul class="lesson-list two-column-list topic-detail-list">
            <li><strong><a class="wiki-term" href="../topics/scalars-vectors-matrices-and-tensors/index.html">Scalars, vectors, matrices, and tensors</a>:</strong> Scalars are single numbers, vectors are ordered lists, matrices are tables, and tensors generalize these ideas to higher-dimensional arrays.</li>
            <li><strong><a class="wiki-term" href="../topics/vector-spaces-subspaces-span-basis-and-dimension/index.html">Vector spaces, subspaces, span, basis, and dimension</a>:</strong> These describe which vectors can be combined, which directions are independent, and how many coordinates are needed.</li>
            <li><strong><a class="wiki-term" href="../topics/linear-independence/index.html">Linear independence</a>:</strong> A set of vectors is independent when none can be recreated from the others, which avoids redundant directions.</li>
            <li><strong><a class="wiki-term" href="../topics/dot-products-and-inner-product-spaces/index.html">Dot products and inner-product spaces</a>:</strong> Dot products measure alignment and support similarity, projection, and geometric reasoning.</li>
            <li><strong><a class="wiki-term" href="../topics/matrix-multiplication-and-tensor-contraction/index.html">Matrix multiplication and tensor contraction</a>:</strong> These combine dimensions to transform data, compose layers, and aggregate features.</li>
            <li><strong><a class="wiki-term" href="../topics/norms/index.html">Norms</a>:</strong> L1, L2, Frobenius, spectral, and related norms measure size, error, sparsity, or operator strength.</li>
            <li><strong><a class="wiki-term" href="../topics/distance-and-similarity-metrics/index.html">Distance and similarity metrics</a>:</strong> Metrics such as Euclidean distance and cosine similarity compare embeddings, examples, and predictions.</li>
            <li><strong><a class="wiki-term" href="../topics/orthogonality-and-orthonormal-bases/index.html">Orthogonality and orthonormal bases</a>:</strong> Perpendicular unit directions make decompositions cleaner and reduce duplicate information.</li>
            <li><strong><a class="wiki-term" href="../topics/projections/index.html">Projections</a>:</strong> Projections drop a vector onto a subspace, keeping the part that matches chosen directions.</li>
            <li><strong><a class="wiki-term" href="../topics/rank-and-null-space/index.html">Rank and null space</a>:</strong> Rank counts independent output directions; the null space contains inputs a matrix maps to zero.</li>
            <li><strong><a class="wiki-term" href="../topics/trace-and-determinant/index.html">Trace and determinant</a>:</strong> Trace summarizes diagonal action, while determinant describes volume scaling and invertibility.</li>
            <li><strong><a class="wiki-term" href="../topics/positive-semidefinite-matrices/index.html">Positive-semidefinite matrices</a>:</strong> These matrices never produce negative quadratic forms and often represent covariance, kernels, or curvature.</li>
            <li><strong><a class="wiki-term" href="../topics/eigenvalues-and-eigenvectors/index.html">Eigenvalues and eigenvectors</a>:</strong> Eigenvectors keep their direction under a transformation, and eigenvalues say how much they scale.</li>
            <li><strong><a class="wiki-term" href="../topics/eigendecomposition/index.html">Eigendecomposition</a>:</strong> Decomposes a matrix into special directions, useful for covariance analysis and dynamics.</li>
            <li><strong><a class="wiki-term" href="../topics/singular-value-decomposition/index.html">Singular value decomposition</a>:</strong> SVD factors any matrix into rotations and scalings, revealing rank, structure, and compression opportunities.</li>
            <li><strong><a class="wiki-term" href="../topics/low-rank-approximation/index.html">Low-rank approximation</a>:</strong> Keeps the strongest directions while discarding weaker ones, which supports compression and denoising.</li>
            <li><strong><a class="wiki-term" href="../topics/sparse-matrices/index.html">Sparse matrices</a>:</strong> Store mostly-zero data efficiently, common in text, graphs, recommendations, and large feature spaces.</li>
            <li><strong><a class="wiki-term" href="../topics/matrix-calculus/index.html">Matrix calculus</a>:</strong> Extends derivatives to vectors and matrices so model parameters can be optimized.</li>
            <li><strong><a class="wiki-term" href="../topics/jacobians-and-hessians/index.html">Jacobians and Hessians</a>:</strong> Jacobians describe first-order vector sensitivity; Hessians describe curvature and second-order change.</li>
            <li><strong><a class="wiki-term" href="../topics/kronecker-products/index.html">Kronecker products</a>:</strong> Build large structured matrices from smaller ones, useful in tensor operations and efficient approximations.</li>
            <li><strong><a class="wiki-term" href="../topics/einstein-summation/index.html">Einstein summation</a>:</strong> A compact notation for tensor contractions that makes high-dimensional operations easier to express.</li>
            <li><strong><a class="wiki-term" href="../topics/numerical-conditioning/index.html">Numerical conditioning</a>:</strong> Measures how much errors are amplified, which affects stability and trustworthy computation.</li>
          </ul>
        </section>

        <section>
          <h2>Essential formulas</h2>
          <div class="formula-stack" aria-label="Essential linear algebra formulas">
            <div class="formula-row">
              <span>Dot product</span>
              <code>x . y = sum_i x_i y_i</code>
            </div>
            <div class="formula-row">
              <span>L2 norm</span>
              <code>||x||_2 = sqrt(sum_i x_i^2)</code>
            </div>
            <div class="formula-row">
              <span>Cosine similarity</span>
              <code>cosine(x, y) = (x^T y) / (||x||_2 ||y||_2)</code>
            </div>
            <div class="formula-row">
              <span>Eigenvector equation</span>
              <code>Av = lambda v</code>
            </div>
            <div class="formula-row">
              <span>Singular value decomposition</span>
              <code>A = U Sigma V^T</code>
            </div>
          </div>
        </section>

        <section>
          <h2>Why it matters for AI</h2>
          <p>
            Data is often represented as vectors or matrices. Models transform those vectors using matrix multiplication, compare them with similarity metrics, and learn useful directions in high-dimensional space.
          </p>
          <p>
            PCA uses the eigenvectors of the covariance matrix, or equivalently the right singular vectors of the centered data matrix, to find high-variance directions.
          </p>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            After this lesson, you should be able to explain what vectors and matrices represent, multiply matrices by hand for small examples, interpret dot products and norms, and describe why eigenvectors and SVD are useful in machine learning.
          </p>
        </section>
