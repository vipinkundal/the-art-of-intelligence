    <template data-lesson-page data-eyebrow="1. Mathematical Foundations" data-title="1.5 Optimization" data-summary="Optimization is the process of choosing parameters, decisions, or actions that make an objective as good as possible. In AI, it is how models reduce loss and improve behavior during training.">
        <section>
          <h2>The simple idea</h2>
          <p>
            A model starts with parameters that produce weak outputs. Optimization changes those parameters step by step so the loss gets smaller, the reward gets larger, or the system better satisfies its constraints.
          </p>
          <div class="lesson-graphic" aria-label="Optimization loop">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>Objective</strong>
                <span>Define what should become smaller, larger, or better constrained.</span>
              </div>
              <div class="graphic-node">
                <strong>Step</strong>
                <span>Use gradients, search, or rules to move parameters in a better direction.</span>
              </div>
              <div class="graphic-node">
                <strong>Stop or repeat</strong>
                <span>Check progress, stability, cost, and generalization before continuing.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>Learn</h2>
          <ul class="lesson-list two-column-list topic-detail-list">
            <li><strong><a class="wiki-term" href="../topics/objectives-losses-and-cost-functions/index.html">Objectives, losses, and cost functions</a>:</strong> These define what the system is trying to minimize, maximize, or balance.</li>
            <li><strong><a class="wiki-term" href="../topics/parameters-and-decision-variables/index.html">Parameters and decision variables</a>:</strong> Parameters are the adjustable values the optimizer changes.</li>
            <li><strong><a class="wiki-term" href="../topics/unconstrained-and-constrained-optimization/index.html">Unconstrained and constrained optimization</a>:</strong> Unconstrained problems move freely; constrained problems must satisfy rules or limits.</li>
            <li><strong><a class="wiki-term" href="../topics/convex-and-non-convex-optimization/index.html">Convex and non-convex optimization</a>:</strong> Convex problems have simpler global structure; non-convex problems can contain many local traps.</li>
            <li><strong><a class="wiki-term" href="../topics/local-minima-global-minima-and-saddle-points/index.html">Local minima, global minima, and saddle points</a>:</strong> These describe places where progress can stop or become ambiguous.</li>
            <li><strong><a class="wiki-term" href="../topics/gradient-descent/index.html">Gradient descent</a>:</strong> Moves parameters opposite the gradient to reduce the objective locally.</li>
            <li><strong><a class="wiki-term" href="../topics/stochastic-gradient-descent/index.html">Stochastic gradient descent</a>:</strong> Estimates the gradient from small random batches, trading exactness for speed.</li>
            <li><strong><a class="wiki-term" href="../topics/mini-batch-optimization/index.html">Mini-batch optimization</a>:</strong> Uses batches large enough for stable estimates but small enough for efficient training.</li>
            <li><strong><a class="wiki-term" href="../topics/learning-rates-and-schedules/index.html">Learning rates and schedules</a>:</strong> Control step size over time, strongly affecting speed and stability.</li>
            <li><strong><a class="wiki-term" href="../topics/momentum-and-adaptive-methods/index.html">Momentum and adaptive methods</a>:</strong> Smooth or rescale updates so optimization handles noisy or uneven gradients better.</li>
            <li><strong><a class="wiki-term" href="../topics/adam-and-rmsprop/index.html">Adam and RMSProp</a>:</strong> Popular adaptive optimizers that track gradient statistics to scale updates.</li>
            <li><strong><a class="wiki-term" href="../topics/line-search/index.html">Line search</a>:</strong> Chooses a step size by testing how the objective changes along a direction.</li>
            <li><strong><a class="wiki-term" href="../topics/newton-and-quasi-newton-methods/index.html">Newton and quasi-Newton methods</a>:</strong> Use curvature information to choose more informed update steps.</li>
            <li><strong><a class="wiki-term" href="../topics/lagrange-multipliers/index.html">Lagrange multipliers</a>:</strong> Convert constrained problems into equations that balance objective and constraint forces.</li>
            <li><strong><a class="wiki-term" href="../topics/kkt-conditions/index.html">KKT conditions</a>:</strong> Generalize optimality conditions for constrained optimization problems.</li>
            <li><strong><a class="wiki-term" href="../topics/regularization-and-penalties/index.html">Regularization and penalties</a>:</strong> Add terms that discourage overly complex, unstable, or undesirable solutions.</li>
            <li><strong><a class="wiki-term" href="../topics/early-stopping/index.html">Early stopping</a>:</strong> Stops training when validation behavior stops improving, reducing overfitting.</li>
            <li><strong><a class="wiki-term" href="../topics/numerical-stability/index.html">Numerical stability</a>:</strong> Keeps calculations reliable despite finite precision, overflow, underflow, or bad scaling.</li>
          </ul>
        </section>

        <section>
          <h2>Essential formulas</h2>
          <div class="formula-stack" aria-label="Essential optimization formulas">
            <div class="formula-row">
              <span>Optimization objective</span>
              <code>theta* = arg min_theta L(theta)</code>
            </div>
            <div class="formula-row">
              <span>Gradient descent</span>
              <code>theta_{t+1} = theta_t - eta grad L(theta_t)</code>
            </div>
            <div class="formula-row">
              <span>Regularized objective</span>
              <code>min_theta L(theta) + lambda R(theta)</code>
            </div>
            <div class="formula-row">
              <span>Lagrangian</span>
              <code>L(theta, lambda) = f(theta) + lambda g(theta)</code>
            </div>
          </div>
        </section>

        <section>
          <h2>Why it matters for AI</h2>
          <p>
            Training a model is usually an optimization problem: choose parameters that reduce prediction error, improve likelihood, satisfy constraints, or maximize expected reward.
          </p>
          <p>
            Optimization choices affect speed, stability, generalization, and cost. Learning rates, batch size, regularization, and optimizer choice can decide whether a model trains well or fails.
          </p>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            After this lesson, you should be able to describe an objective function, explain gradient descent and stochastic optimization, identify common optimizer choices, and explain why regularization and learning rates matter.
          </p>
        </section>
