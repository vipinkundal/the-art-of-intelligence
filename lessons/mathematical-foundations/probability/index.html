    <template data-lesson-page data-eyebrow="1. Mathematical Foundations" data-title="1.3 Probability" data-summary="Probability is the language of uncertainty. It helps AI systems reason from incomplete data, model noise, estimate confidence, sample possibilities, and compare competing explanations.">
        <section>
          <h2>The simple idea</h2>
          <p>
            Probability assigns numbers to uncertain events. In AI, those numbers help models express how likely an output is, how much evidence supports a prediction, and how uncertain a decision remains.
          </p>
          <div class="lesson-graphic" aria-label="Probability reasoning flow">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>Events</strong>
                <span>Define what can happen and assign probabilities to each possible outcome.</span>
              </div>
              <div class="graphic-node">
                <strong>Evidence</strong>
                <span>Condition on observations to update beliefs and compare explanations.</span>
              </div>
              <div class="graphic-node">
                <strong>Decisions</strong>
                <span>Use expectations, uncertainty, and sampling to choose or evaluate actions.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>Understand</h2>
          <ul class="lesson-list two-column-list topic-detail-list">
            <li><strong><a class="wiki-term" href="../topics/sample-spaces-and-events/index.html">Sample spaces and events</a>:</strong> The sample space lists possible outcomes; an event is a subset of outcomes you care about.</li>
            <li><strong><a class="wiki-term" href="../topics/conditional-probability/index.html">Conditional probability</a>:</strong> Updates the chance of an event after you know another event has occurred.</li>
            <li><strong><a class="wiki-term" href="../topics/independence-and-conditional-independence/index.html">Independence and conditional independence</a>:</strong> Independence means one event gives no information about another; conditional independence means that after controlling for a third variable.</li>
            <li><strong><a class="wiki-term" href="../topics/random-variables/index.html">Random variables</a>:</strong> Functions that assign numeric or categorical values to uncertain outcomes.</li>
            <li><strong><a class="wiki-term" href="../topics/probability-mass-and-density-functions/index.html">Probability mass and density functions</a>:</strong> PMFs handle discrete outcomes; densities describe continuous outcomes through areas under a curve.</li>
            <li><strong><a class="wiki-term" href="../topics/cumulative-distributions/index.html">Cumulative distributions</a>:</strong> Give the probability that a random variable is less than or equal to a value.</li>
            <li><strong><a class="wiki-term" href="../topics/joint-marginal-and-conditional-distributions/index.html">Joint, marginal, and conditional distributions</a>:</strong> Joint distributions model variables together, marginals focus on one variable, and conditionals update one variable given another.</li>
            <li><strong><a class="wiki-term" href="../topics/expectation/index.html">Expectation</a>:</strong> The long-run average value of a random variable under its distribution.</li>
            <li><strong><a class="wiki-term" href="../topics/variance-and-covariance/index.html">Variance and covariance</a>:</strong> Variance measures spread; covariance measures how two variables move together.</li>
            <li><strong><a class="wiki-term" href="../topics/correlation/index.html">Correlation</a>:</strong> A normalized covariance that ranges from negative to positive association.</li>
            <li><strong><a class="wiki-term" href="../topics/law-of-total-probability/index.html">Law of total probability</a>:</strong> Breaks a probability into cases and adds their weighted contributions.</li>
            <li><strong><a class="wiki-term" href="../topics/bayes-theorem/index.html">Bayes' theorem</a>:</strong> Reverses conditioning so evidence can update beliefs about hidden causes.</li>
            <li><strong><a class="wiki-term" href="../topics/law-of-large-numbers/index.html">Law of large numbers</a>:</strong> Sample averages converge toward expected values as sample size grows.</li>
            <li><strong><a class="wiki-term" href="../topics/central-limit-theorem/index.html">Central limit theorem</a>:</strong> Many averaged random effects become approximately Gaussian under broad conditions.</li>
            <li><strong><a class="wiki-term" href="../topics/markov-chains/index.html">Markov chains</a>:</strong> Model sequences where the next state depends on the current state, not the full history.</li>
            <li><strong><a class="wiki-term" href="../topics/markov-processes/index.html">Markov processes</a>:</strong> Generalize memoryless state transitions over time.</li>
            <li><strong><a class="wiki-term" href="../topics/monte-carlo-estimation/index.html">Monte Carlo estimation</a>:</strong> Uses random samples to approximate expectations or probabilities that are hard to compute exactly.</li>
            <li><strong><a class="wiki-term" href="../topics/importance-sampling/index.html">Importance sampling</a>:</strong> Samples from a more convenient distribution and reweights samples to estimate the target distribution.</li>
            <li><strong><a class="wiki-term" href="../topics/rejection-sampling/index.html">Rejection sampling</a>:</strong> Samples from a proposal distribution and accepts only samples that fit the target shape.</li>
          </ul>
        </section>

        <section>
          <h2>Essential formulas</h2>
          <div class="formula-stack" aria-label="Essential probability formulas">
            <div class="formula-row">
              <span>Bayes' theorem</span>
              <code>P(A | B) = P(B | A)P(A) / P(B)</code>
            </div>
            <div class="formula-row">
              <span>Expectation, discrete</span>
              <code>E[X] = sum_x x P(X = x)</code>
            </div>
            <div class="formula-row">
              <span>Expectation, continuous</span>
              <code>E[X] = integral x p(x) dx</code>
            </div>
            <div class="formula-row">
              <span>Variance</span>
              <code>Var(X) = E[(X - E[X])^2]</code>
            </div>
            <div class="formula-row">
              <span>Covariance</span>
              <code>Cov(X, Y) = E[(X - E[X])(Y - E[Y])]</code>
            </div>
          </div>
        </section>

        <section>
          <h2>Important distributions</h2>
          <ul class="lesson-list two-column-list topic-detail-list">
            <li><strong><a class="wiki-term" href="../topics/bernoulli/index.html">Bernoulli</a>:</strong> Models one yes-or-no trial, such as click or no click.</li>
            <li><strong><a class="wiki-term" href="../topics/binomial/index.html">Binomial</a>:</strong> Counts successes across a fixed number of Bernoulli trials.</li>
            <li><strong><a class="wiki-term" href="../topics/categorical/index.html">Categorical</a>:</strong> Models one choice among several classes.</li>
            <li><strong><a class="wiki-term" href="../topics/multinomial/index.html">Multinomial</a>:</strong> Counts how many times each class appears across repeated categorical trials.</li>
            <li><strong><a class="wiki-term" href="../topics/uniform/index.html">Uniform</a>:</strong> Gives equal probability to each value in a range or set.</li>
            <li><strong><a class="wiki-term" href="../topics/gaussian/index.html">Gaussian</a>:</strong> Models bell-shaped continuous variation around a mean.</li>
            <li><strong><a class="wiki-term" href="../topics/multivariate-gaussian/index.html">Multivariate Gaussian</a>:</strong> Extends Gaussian structure to vectors with covariance between dimensions.</li>
            <li><strong><a class="wiki-term" href="../topics/poisson/index.html">Poisson</a>:</strong> Counts events occurring in a fixed interval when events are rare and independent.</li>
            <li><strong><a class="wiki-term" href="../topics/exponential/index.html">Exponential</a>:</strong> Models waiting time between events in a Poisson process.</li>
            <li><strong><a class="wiki-term" href="../topics/beta/index.html">Beta</a>:</strong> Models uncertainty over a probability between zero and one.</li>
            <li><strong><a class="wiki-term" href="../topics/gamma/index.html">Gamma</a>:</strong> Models positive continuous quantities such as waiting times or rates.</li>
            <li><strong><a class="wiki-term" href="../topics/dirichlet/index.html">Dirichlet</a>:</strong> Models uncertainty over a vector of probabilities that sum to one.</li>
            <li><strong><a class="wiki-term" href="../topics/student-s-t/index.html">Student's t</a>:</strong> Handles heavier-tailed uncertainty, often when sample sizes are small.</li>
            <li><strong><a class="wiki-term" href="../topics/log-normal/index.html">Log-normal</a>:</strong> Models positive values whose logarithm is Gaussian.</li>
            <li><strong><a class="wiki-term" href="../topics/gumbel/index.html">Gumbel</a>:</strong> Models extremes and appears in differentiable sampling tricks.</li>
          </ul>
        </section>

        <section>
          <h2>Why it matters for AI</h2>
          <p>
            Many AI methods are probabilistic: classifiers estimate class probabilities, language models predict token distributions, Bayesian methods update beliefs, and sampling methods approximate quantities that are hard to compute exactly.
          </p>
          <p>
            Probability also supports evaluation and reliability by helping you reason about uncertainty, variance, confidence, rare events, and expected outcomes.
          </p>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            After this lesson, you should be able to explain conditional probability, Bayes' theorem, expectation, variance, covariance, common distributions, and why sampling is useful in machine learning.
          </p>
