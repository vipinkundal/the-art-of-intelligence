    <template data-lesson-page data-eyebrow="1. Mathematical Foundations" data-title="1.4 Statistics" data-summary="Statistics helps turn data into evidence. It gives AI builders tools for estimating parameters, measuring uncertainty, testing claims, designing experiments, and detecting when data changes.">
        <section>
          <h2>The simple idea</h2>
          <p>
            Statistics asks what we can learn from limited data and how confident we should be. In AI, that matters whenever we train, compare, evaluate, deploy, or monitor a model.
          </p>
          <div class="lesson-graphic" aria-label="Statistics evidence flow">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>Sample</strong>
                <span>Observe limited data that may be noisy, biased, or incomplete.</span>
              </div>
              <div class="graphic-node">
                <strong>Estimate</strong>
                <span>Infer parameters, uncertainty, effects, and likely future behavior.</span>
              </div>
              <div class="graphic-node">
                <strong>Decide</strong>
                <span>Use evidence to compare models, monitor drift, and avoid overclaiming.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>Learn</h2>
          <ul class="lesson-list two-column-list topic-detail-list">
            <li><strong>Populations and samples:</strong> The population is what you want to understand; the sample is the data you actually observe.</li>
            <li><strong>Bias and variance:</strong> Bias is systematic error; variance is sensitivity to the particular sample or training data.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Point_estimation" target="_blank" rel="noopener noreferrer" title="Wikipedia: Point estimation">Point estimation</a>:</strong> Produces a single best estimate of an unknown quantity from data.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Maximum_likelihood_estimation" target="_blank" rel="noopener noreferrer" title="Wikipedia: Maximum likelihood estimation">Maximum likelihood estimation</a>:</strong> Chooses parameters that make the observed data most probable under the model.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Maximum_a_posteriori_estimation" target="_blank" rel="noopener noreferrer" title="Wikipedia: Maximum a posteriori estimation">Maximum a posteriori estimation</a>:</strong> Combines likelihood with a prior preference over parameters.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Confidence_interval" target="_blank" rel="noopener noreferrer" title="Wikipedia: Confidence interval">Confidence intervals</a>:</strong> Provide a range that would capture the true value at a stated rate under repeated sampling.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Statistical_hypothesis_test" target="_blank" rel="noopener noreferrer" title="Wikipedia: Statistical hypothesis test">Hypothesis testing</a>:</strong> Uses data to evaluate whether an observed effect is surprising under a baseline assumption.</li>
            <li><strong>p-values and statistical power:</strong> p-values quantify surprise under a null hypothesis; power measures the chance of detecting a real effect.</li>
            <li><strong>Bootstrap:</strong> Resamples observed data to estimate uncertainty without deriving a formula.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Bayesian_inference" target="_blank" rel="noopener noreferrer" title="Wikipedia: Bayesian inference">Bayesian inference</a>:</strong> Updates prior beliefs into posterior beliefs using observed evidence.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Conjugate_prior" target="_blank" rel="noopener noreferrer" title="Wikipedia: Conjugate prior">Conjugate priors</a>:</strong> Priors that keep posterior calculations in the same distribution family.</li>
            <li><strong>Posterior predictive distributions:</strong> Predict future observations while accounting for parameter uncertainty.</li>
            <li><strong>Missing-data mechanisms:</strong> Describe why values are absent, which determines whether simple fixes are safe.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Design_of_experiments" target="_blank" rel="noopener noreferrer" title="Wikipedia: Design of experiments">Experimental design</a>:</strong> Plans data collection so comparisons are fair, powered, and interpretable.</li>
            <li><strong>Multiple-testing correction:</strong> Controls false discoveries when many hypotheses are tested at once.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Effect_size" target="_blank" rel="noopener noreferrer" title="Wikipedia: Effect size">Effect size</a>:</strong> Measures how large a difference is, not just whether it is statistically detectable.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Calibration" target="_blank" rel="noopener noreferrer" title="Wikipedia: Calibration">Calibration</a>:</strong> Checks whether predicted probabilities match real-world frequencies.</li>
            <li><strong>Distribution shift:</strong> Occurs when deployment data differs from training or validation data.</li>
          </ul>
        </section>

        <section>
          <h2>Essential formulas</h2>
          <div class="formula-stack" aria-label="Essential statistics formulas">
            <div class="formula-row">
              <span>Maximum likelihood</span>
              <code>theta_hat_MLE = arg max_theta sum_i log p_theta(x_i)</code>
            </div>
            <div class="formula-row">
              <span>MAP estimation</span>
              <code>theta_hat_MAP = arg max_theta [sum_i log p_theta(x_i) + log p(theta)]</code>
            </div>
            <div class="formula-row">
              <span>Bias-variance decomposition</span>
              <code>E[(y - f_hat(x))^2] = Bias^2 + Variance + Irreducible noise</code>
            </div>
          </div>
        </section>

        <section>
          <h2>Why it matters for AI</h2>
          <p>
            Statistics helps you decide whether a model improvement is real, whether a dataset represents the target population, and whether predictions remain calibrated after deployment.
          </p>
          <p>
            Estimation methods such as MLE and MAP connect data, likelihoods, priors, and model parameters. Bias-variance reasoning explains why models can underfit, overfit, or fail under distribution shift.
          </p>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            After this lesson, you should be able to explain samples versus populations, MLE, MAP, confidence intervals, p-values, bias and variance, calibration, and distribution shift in model evaluation.
          </p>
        </section>
