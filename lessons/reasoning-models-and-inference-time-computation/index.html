        <section>
          <h2>Reasoning-time loop</h2>
          <div class="lesson-graphic" aria-label="Reasoning model inference loop">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>Generate paths</strong>
                <span>Use prompting, decomposition, or search to produce candidate reasoning traces.</span>
              </div>
              <div class="graphic-node">
                <strong>Check steps</strong>
                <span>Apply verifiers, tools, tests, or voting to find stronger answers.</span>
              </div>
              <div class="graphic-node">
                <strong>Spend compute</strong>
                <span>Trade more inference work for better reliability when the task deserves it.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>Learn</h2>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Prompt_engineering" target="_blank" rel="noopener noreferrer" title="Wikipedia: Prompt engineering">Chain-of-thought prompting</a>:</strong> Encourages intermediate reasoning text before the final answer.</li>
            <li><strong><a class="wiki-term" href="https://arxiv.org/abs/2112.00114" target="_blank" rel="noopener noreferrer" title="arXiv: Show Your Work">Scratchpad computation</a>:</strong> Gives the model working space for calculations, notes, or intermediate state.</li>
            <li><strong><a class="wiki-term" href="https://arxiv.org/abs/2203.11171" target="_blank" rel="noopener noreferrer" title="arXiv: Self-consistency improves chain of thought">Self-consistency</a>:</strong> Samples multiple reasoning paths and chooses the answer that appears most consistently.</li>
            <li><strong><a class="wiki-term" href="https://arxiv.org/abs/2205.10625" target="_blank" rel="noopener noreferrer" title="arXiv: Least-to-most prompting">Least-to-most prompting</a>:</strong> Solves simpler subproblems first, then combines them into the full solution.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Decomposition" target="_blank" rel="noopener noreferrer" title="Wikipedia: Decomposition">Decomposition</a>:</strong> Breaks a hard task into smaller questions that can be solved and checked independently.</li>
            <li><strong><a class="wiki-term" href="https://arxiv.org/abs/2305.10601" target="_blank" rel="noopener noreferrer" title="arXiv: Tree of Thoughts">Tree of Thoughts</a>:</strong> Searches a branching tree of candidate reasoning steps.</li>
            <li><strong><a class="wiki-term" href="https://arxiv.org/abs/2308.09687" target="_blank" rel="noopener noreferrer" title="arXiv: Graph of Thoughts">Graph of Thoughts</a>:</strong> Allows reasoning states to merge, revise, and connect more flexibly than a tree.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Beam_search" target="_blank" rel="noopener noreferrer" title="Wikipedia: Beam search">Beam search over reasoning traces</a>:</strong> Keeps the best few partial reasoning paths at each step.</li>
            <li><strong><a class="wiki-term" href="https://arxiv.org/abs/2203.02155" target="_blank" rel="noopener noreferrer" title="arXiv: InstructGPT">Best-of-N sampling</a>:</strong> Generates many candidate answers and picks the strongest by scoring or verification.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Majority_rule" target="_blank" rel="noopener noreferrer" title="Wikipedia: Majority rule">Majority voting</a>:</strong> Chooses the most common answer across independent attempts.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Process_supervision" target="_blank" rel="noopener noreferrer" title="Wikipedia: Process supervision">Process supervision</a>:</strong> Trains or scores the intermediate reasoning steps, not just the final answer.</li>
            <li><strong><a class="wiki-term" href="https://arxiv.org/abs/2305.20050" target="_blank" rel="noopener noreferrer" title="arXiv: Let's Verify Step by Step">Outcome supervision</a>:</strong> Rewards only the final result, even if the internal path is unknown or messy.</li>
            <li><strong><a class="wiki-term" href="https://arxiv.org/abs/2305.20050" target="_blank" rel="noopener noreferrer" title="arXiv: Let's Verify Step by Step">Step-level verification</a>:</strong> Checks each intermediate claim or operation for correctness.</li>
            <li><strong><a class="wiki-term" href="https://arxiv.org/abs/2211.10435" target="_blank" rel="noopener noreferrer" title="arXiv: Program-aided language models">Program-aided reasoning</a>:</strong> Uses generated code or symbolic programs to perform exact calculations.</li>
            <li><strong><a class="wiki-term" href="https://arxiv.org/abs/2302.04761" target="_blank" rel="noopener noreferrer" title="arXiv: Toolformer">Tool-assisted reasoning</a>:</strong> Calls search, calculators, code, retrieval, or APIs to ground the answer.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Execution_(computing)" target="_blank" rel="noopener noreferrer" title="Wikipedia: Execution (computing)">Code execution</a>:</strong> Runs code to test hypotheses, compute results, or verify examples.</li>
            <li><strong><a class="wiki-term" href="https://arxiv.org/abs/2305.10601" target="_blank" rel="noopener noreferrer" title="arXiv: Tree of Thoughts">Search over latent or textual reasoning</a>:</strong> Explores multiple internal or visible paths before committing.</li>
            <li><strong><a class="wiki-term" href="https://arxiv.org/abs/1909.13231" target="_blank" rel="noopener noreferrer" title="arXiv: Test-time training">Test-time adaptation</a>:</strong> Adjusts behavior during inference based on the current task or feedback.</li>
            <li><strong><a class="wiki-term" href="https://arxiv.org/abs/1603.08983" target="_blank" rel="noopener noreferrer" title="arXiv: Adaptive computation time">Adaptive computation</a>:</strong> Spends more reasoning steps on harder examples and fewer on easy ones.</li>
            <li><strong><a class="wiki-term" href="https://arxiv.org/abs/2408.03314" target="_blank" rel="noopener noreferrer" title="arXiv: Scaling test-time compute">Inference-time scaling</a>:</strong> Improves answers by increasing compute used during generation, search, or verification.</li>
          </ul>
        </section>

        <section>
          <h2>Reference model</h2>
          <p>
            DeepSeek-R1 is an important reference for reinforcement-learning-driven reasoning behaviour and for studying the role of verification, reflection, and post-training.
          </p>
        </section>

        <section>
          <h2>Important distinction</h2>
          <ul class="lesson-list dense-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Fluency" target="_blank" rel="noopener noreferrer" title="Wikipedia: Fluency">Fluency</a></strong> is not reasoning.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Verbosity" target="_blank" rel="noopener noreferrer" title="Wikipedia: Verbosity">Long output</a></strong> is not necessarily better reasoning.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Explainable_artificial_intelligence" target="_blank" rel="noopener noreferrer" title="Wikipedia: Explainable artificial intelligence">Self-explanation</a></strong> is not proof of internal correctness.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Benchmark_(computing)" target="_blank" rel="noopener noreferrer" title="Wikipedia: Benchmark (computing)">Benchmark accuracy</a></strong> does not guarantee robustness outside the benchmark.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Verification_and_validation" target="_blank" rel="noopener noreferrer" title="Wikipedia: Verification and validation">A verifier</a></strong> can be as important as the generator.</li>
          </ul>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            You should be able to compare prompting, search, verification, tool-use, and test-time computation strategies, and explain why stronger reasoning claims require checks beyond fluent explanations.
          </p>
