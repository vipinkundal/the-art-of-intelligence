        <section>
          <h2>Signal pipeline</h2>
          <div class="lesson-graphic" aria-label="Speech audio and time-series pipeline">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>Sample</strong>
                <span>Convert continuous signals into discrete measurements over time.</span>
              </div>
              <div class="graphic-node">
                <strong>Represent</strong>
                <span>Use spectra, features, windows, or learned embeddings to expose patterns.</span>
              </div>
              <div class="graphic-node">
                <strong>Model</strong>
                <span>Forecast, classify, transcribe, separate, or generate time-dependent signals.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>Study</h2>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong>Sampling theory:</strong> Explains how often to measure a continuous signal so important frequencies are preserved.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Fourier_transform" target="_blank" rel="noopener noreferrer" title="Wikipedia: Fourier transform">Fourier transform</a>:</strong> Converts a signal from time view into frequency components.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Fast_Fourier_transform" target="_blank" rel="noopener noreferrer" title="Wikipedia: Fast Fourier transform">Fast Fourier transform</a>:</strong> Computes Fourier transforms efficiently for practical signal processing.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Short-time_Fourier_transform" target="_blank" rel="noopener noreferrer" title="Wikipedia: Short-time Fourier transform">Short-time Fourier transform</a>:</strong> Applies Fourier analysis over sliding windows to show how frequencies change over time.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Spectrogram" target="_blank" rel="noopener noreferrer" title="Wikipedia: Spectrogram">Spectrograms</a>:</strong> Visualize time, frequency, and intensity in one representation.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Mel_scale" target="_blank" rel="noopener noreferrer" title="Wikipedia: Mel scale">Mel scale</a>:</strong> Warps frequencies to better match human pitch perception.</li>
            <li><strong>MFCCs:</strong> Compact speech features derived from mel-frequency spectral information.</li>
            <li><strong>Digital filtering:</strong> Removes, emphasizes, or reshapes parts of a signal by frequency or time behavior.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Autocorrelation" target="_blank" rel="noopener noreferrer" title="Wikipedia: Autocorrelation">Autocorrelation</a>:</strong> Measures how a signal relates to delayed versions of itself.</li>
            <li><strong>Time-series decomposition:</strong> Separates trend, seasonality, cycles, and residual noise.</li>
            <li><strong>AR, MA and ARIMA:</strong> Classical forecasting models based on past values, past errors, and differencing.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Exponential_smoothing" target="_blank" rel="noopener noreferrer" title="Wikipedia: Exponential smoothing">Exponential smoothing</a>:</strong> Forecasts by weighting recent observations more strongly than older ones.</li>
            <li><strong>State-space forecasting:</strong> Tracks hidden system state and updates predictions as observations arrive.</li>
            <li><strong>Temporal CNNs:</strong> Use convolutions over time windows to detect local sequence patterns.</li>
            <li><strong>Recurrent forecasting:</strong> Updates a hidden state step by step through a time series.</li>
            <li><strong>Transformer forecasting:</strong> Uses attention to relate different time steps and covariates.</li>
          </ul>
        </section>

        <section>
          <h2>Speech algorithms and architectures</h2>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong>HMM-GMM speech recognition:</strong> A classical ASR approach that combines hidden state sequences with Gaussian acoustic models.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Connectionist_temporal_classification" target="_blank" rel="noopener noreferrer" title="Wikipedia: Connectionist temporal classification">Connectionist temporal classification</a>:</strong> Trains sequence models without exact frame-level alignments between audio and text.</li>
            <li><strong>RNN Transducer:</strong> Predicts output tokens while jointly modelling acoustic time steps and generated text history.</li>
            <li><strong>Attention-based encoder-decoder:</strong> Encodes audio and attends over it while generating transcription tokens.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Conformer" target="_blank" rel="noopener noreferrer" title="Wikipedia: Conformer">Conformer</a>:</strong> Combines convolution and transformer attention for speech sequence modelling.</li>
            <li><strong>Self-supervised speech representation:</strong> Learns acoustic features from unlabeled audio through prediction or masking tasks.</li>
            <li><strong>Neural vocoders:</strong> Convert acoustic features or intermediate representations into waveform audio.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/WaveNet" target="_blank" rel="noopener noreferrer" title="Wikipedia: WaveNet">WaveNet</a>:</strong> An autoregressive neural audio model that generates waveforms sample by sample.</li>
            <li><strong>Diffusion and flow-based audio generation:</strong> Generate audio through denoising or invertible transformations.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Speaker_recognition" target="_blank" rel="noopener noreferrer" title="Wikipedia: Speaker recognition">Speaker recognition</a>:</strong> Identifies or verifies who is speaking from voice characteristics.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Voice_activity_detection" target="_blank" rel="noopener noreferrer" title="Wikipedia: Voice activity detection">Voice activity detection</a>:</strong> Detects when speech is present versus silence or background noise.</li>
            <li><strong>Source separation:</strong> Splits mixed audio into components such as speakers, instruments, or noise.</li>
          </ul>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            You should be able to explain how signals become spectral features, how classical forecasting differs from neural sequence forecasting, and how modern speech systems combine acoustic representations, alignment, decoding, and generation.
          </p>
        </section>
