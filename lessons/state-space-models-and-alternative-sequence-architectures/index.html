        <section>
          <h2>Sequence architecture map</h2>
          <div class="lesson-graphic" aria-label="State-space sequence modelling flow">
            <div class="graphic-flow">
              <div class="graphic-node">
                <strong>State</strong>
                <span>Compress past inputs into a hidden state that can be updated step by step.</span>
              </div>
              <div class="graphic-node">
                <strong>Long context</strong>
                <span>Use structure, convolutions, or selective updates to scale beyond quadratic attention.</span>
              </div>
              <div class="graphic-node">
                <strong>Hybrid design</strong>
                <span>Combine attention, recurrence, convolution, and gating where each is strongest.</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2>Study</h2>
          <ul class="lesson-list two-column-list dense-list topic-detail-list">
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Linear_dynamical_system" target="_blank" rel="noopener noreferrer" title="Wikipedia: Linear dynamical system">Linear dynamical systems</a>:</strong> Model a hidden state that evolves through linear updates and emits observations over time.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/State-space_representation" target="_blank" rel="noopener noreferrer" title="Wikipedia: State-space representation">State-space models</a>:</strong> Track sequence history with a compact recurrent state instead of comparing every token to every other token.</li>
            <li><strong>Structured state spaces:</strong> Constrain the state update matrices so long sequences can be processed efficiently and stably.</li>
            <li><strong>S4:</strong> A structured state-space architecture designed to model very long dependencies with efficient convolutional computation.</li>
            <li><strong><a class="wiki-term" href="https://en.wikipedia.org/wiki/Mamba_(deep_learning_architecture)" target="_blank" rel="noopener noreferrer" title="Wikipedia: Mamba (deep learning architecture)">Mamba</a>:</strong> Uses selective state-space updates so the model can choose which information to keep or forget based on the input.</li>
            <li><strong>Selective state-space models:</strong> Make state updates input-dependent, improving expressiveness compared with fixed linear dynamics.</li>
            <li><strong>Gated convolutions:</strong> Use gates to control which convolutional features pass through a sequence model.</li>
            <li><strong>Hyena-style long convolutions:</strong> Replace attention with implicit long filters that can mix information over large contexts.</li>
            <li><strong>Retention mechanisms:</strong> Blend recurrent memory and attention-like weighting to keep useful historical information.</li>
            <li><strong>Transformer-SSM hybrids:</strong> Combine attention blocks with state-space or convolutional blocks for better efficiency-quality trade-offs.</li>
          </ul>
        </section>

        <section>
          <h2>Basic state-space form</h2>
          <div class="formula-stack">
            <div class="formula-display">
              <code>h_t = A h_{t-1} + B x_t</code>
            </div>
            <div class="formula-display">
              <code>y_t = C h_t + D x_t</code>
            </div>
          </div>
          <p>
            These models are relevant to long-sequence processing and efficient alternatives to quadratic attention. They should be learned after transformers, not instead of transformers.
          </p>
        </section>

        <section>
          <h2>Learning target</h2>
          <p>
            You should be able to explain the recurrent state update, the output projection, why structured state spaces can scale to long sequences, and where SSMs, gated convolutions, retention, and transformer hybrids fit relative to attention.
          </p>
